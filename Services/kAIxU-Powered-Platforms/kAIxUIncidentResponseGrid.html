<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kAIxU Incident Response Grid</title>
  <meta name="description" content="Incident intake, triage, escalation, SLA monitoring, and verified closeout workflows for operations teams." />
</head>
<body>
  <div id="siteHeaderMount" data-sol-partial="header"></div>
  <main>
    <h1>kAIxU Incident Response Grid</h1>
    <p>Incident intake, triage, escalation, SLA monitoring, and verified closeout workflows for operations teams.</p>
    <h2>Pricing</h2>
    <ul>
      <li>$9,500 starter</li>
      <li>$20,500 professional</li>
      <li>$36,500 enterprise</li>
    </ul>
  </main>
  <div id="siteFooterMount" data-sol-partial="footer"></div>
  <script id="sol-global-partials-injector">
    (function(){
      const mountHeader = document.getElementById('siteHeaderMount');
      const mountFooter = document.getElementById('siteFooterMount');
      const inject = async (url, mount) => {
        if (!mount || mount.dataset.loaded === 'true') return;
        try {
          const res = await fetch(url, { cache: 'no-cache' });
          if (!res.ok) return;
          mount.innerHTML = await res.text();
          mount.dataset.loaded = 'true';
        } catch (err) {
          console.warn('Global partial inject failed for', url, err);
        }
      };
      const run = () => {
        inject('/partials/header.html', mountHeader);
        inject('/partials/footer.html', mountFooter);
      };
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', run, { once: true });
      } else {
        run();
      }
    })();
  </script>
</body>
</html>
