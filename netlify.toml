[build]
  publish = "."

# CRITICAL: Do not disable root functions for this site.
# Gateway 13/admin auth/API depend on live function routes under `/.netlify/functions/*`.
# If this directory is changed to a disabled/empty path, login and gateway APIs 404 immediately.
[functions]
  directory = "netlify/functions"

# The site is plain HTML/CSS/JS. We keep build intentionally empty.
# Functions are deployed via Netlify CLI (recommended) or Git-based builds.

# PWA: service worker must never be cached
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"

# SkyeDocX PWA
[[headers]]
  for = "/SkyeDocx/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/SkyeDocx/"

[[headers]]
  for = "/SkyeDocx/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/SkyeDocx/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/SkyeDocx/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/manifest+json"
