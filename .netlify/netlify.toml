[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"
Content-Security-Policy = "default-src 'self' https: data: blob:; script-src 'self' https://cdnjs.cloudflare.com https://identity.netlify.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' https: data: blob:; connect-src 'self' https:; frame-ancestors 'none';"

[[headers]]
for = "/sw.js"

[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"
Service-Worker-Allowed = "/"

[[headers]]
for = "/manifest.json"

[headers.values]
Cache-Control = "public, max-age=86400"
Content-Type = "application/manifest+json"

[[headers]]
for = "/SkyeDocx/service-worker.js"

[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"
Service-Worker-Allowed = "/SkyeDocx/"

[[headers]]
for = "/SkyeDocx/sw.js"

[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/SkyeDocx/manifest.webmanifest"

[headers.values]
