[build]
  publish = "public"
  functions = "netlify/functions"
  # No build step required; Netlify will still install deps for Functions bundling when package.json is present.
  command = "echo 'no build (static publish + functions bundling)'"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
