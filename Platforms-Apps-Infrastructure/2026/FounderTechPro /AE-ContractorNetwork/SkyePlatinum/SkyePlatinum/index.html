    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'skye-platinum-hub-v1';
        const pageParams = new URLSearchParams(window.location.search);
        const wsId = pageParams.get('ws_id') || 'primary-workspace';
        const workspaceRecordApp = 'SkyePlatinum';
        const logoSrc = "https://cdn1.sharemyimage.com/2026/02/16/logo1_transparent.png";

        const createRecordId = (prefix) => {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                return `${prefix}-${window.crypto.randomUUID()}`;
            }
            return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
        };

        const getTimestampValue = (value) => {
            if (!value) return 0;
            if (typeof value === 'number' && Number.isFinite(value)) return value;
            if (typeof value === 'string') {
                const parsed = Date.parse(value);
                return Number.isNaN(parsed) ? 0 : parsed;
            }
            if (typeof value === 'object' && typeof value.seconds === 'number') {
                return (value.seconds * 1000) + Math.round(Number(value.nanoseconds || 0) / 1000000);
            }
            return 0;
        };

        const normalizeClient = (client) => {
            const record = client && typeof client === 'object' ? client : {};
            return {
                id: record.id || createRecordId('client'),
                name: String(record.name || ''),
                entityType: String(record.entityType || 'Corporation'),
                status: String(record.status || 'Active'),
                totalValue: Number(record.totalValue || 0),
                createdAt: record.createdAt || null,
            };
        };

        const normalizeLedgerEntry = (entry) => {
            const record = entry && typeof entry === 'object' ? entry : {};
            return {
                id: record.id || createRecordId('ledger'),
                clientId: String(record.clientId || ''),
                clientName: String(record.clientName || ''),
                amount: Number(record.amount || 0),
                type: record.type === 'Debit' ? 'Debit' : 'Credit',
                description: String(record.description || ''),
                timestamp: record.timestamp || new Date().toISOString(),
            };
        };

        const sortLedgerEntries = (entries) => {
            return (Array.isArray(entries) ? entries : [])
                .map(normalizeLedgerEntry)
                .sort((a, b) => getTimestampValue(b.timestamp) - getTimestampValue(a.timestamp));
        };

        const ecosystemNodes = [
            { name: "SKye Sol", url: "https://skyesoverlondon.com/" },

        const Icon = ({ name, size = 20, className = "" }) => {

                ),
                cpu: (
                    <React.Fragment>
                        <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>

                trash: (
                    <React.Fragment>
                        <polyline points="3 6 5 6 21 6"/>

                ),
                external: (
                    <React.Fragment>
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                        <polyline points="15 3 21 3 21 9"/>
                        <line x1="10" y1="14" x2="21" y2="3"/>
                    </React.Fragment>
                ),
                search: (
                    <React.Fragment>
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </React.Fragment>
                ),
                arrowRight: (
                    <React.Fragment>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </React.Fragment>
                ),
                upRight: (
                    <React.Fragment>
                        <line x1="7" y1="17" x2="17" y2="7"/>
                        <polyline points="7 7 17 7 17 17"/>
                    </React.Fragment>
                ),
                downRight: (
                    <React.Fragment>
                        <line x1="7" y1="7" x2="17" y2="17"/>
                        <polyline points="17 7 17 17 7 17"/>
                    </React.Fragment>
                )
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const App = () => {
            const [sessionReady, setSessionReady] = useState(false);
            const [showIntro, setShowIntro] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [notifications, setNotifications] = useState([]);
            
            const [clients, setClients] = useState([]);
            const [ledger, setLedger] = useState([]);
            const [kaixuAccessKey, setKaixuAccessKey] = useState("");
            const [aiInsight, setAiInsight] = useState("");
            const [aiDirectives, setAiDirectives] = useState([]);
            const [directiveWorkflow, setDirectiveWorkflow] = useState([]);
            const [isGeneratingAi, setIsGeneratingAi] = useState(false);

            const [searchTerm, setSearchTerm] = useState("");
            const [ledgerFilter, setLedgerFilter] = useState("All");
            const [selectedClientDetail, setSelectedClientDetail] = useState(null);
            const [showAddClient, setShowAddClient] = useState(false);
            const [showAddTransaction, setShowAddTransaction] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [isImporting, setIsImporting] = useState(false);
            const [operatorRole, setOperatorRole] = useState(() => localStorage.getItem('skye.platinum.role') || 'member');
            
            const [clientForm, setClientForm] = useState({ name: '', entityType: 'Corporation', status: 'Active' });
            const [txForm, setTxForm] = useState({ clientId: '', amount: '', type: 'Credit', description: '' });
            const [tempKey, setTempKey] = useState('');

            const particlesRef = useRef(null);
            const workspaceStateRef = useRef({ clients: [], ledger: [], kaixuAccessKey: '' });
            const workspaceSyncRef = useRef(null);
            const hasHydratedRef = useRef(false);
            const isApplyingRemoteRef = useRef(false);
            const autosaveTimerRef = useRef(null);

            useEffect(() => {
                const timer = setTimeout(() => setShowIntro(false), 4500);
                return () => clearTimeout(timer);
            }, []);

            const analytics = useMemo(() => {
                const totalRevenue = ledger.reduce((acc, tx) => tx.type === 'Credit' ? acc + Number(tx.amount) : acc - Number(tx.amount), 0);
                const sortedLedger = [...ledger].sort((a, b) => getTimestampValue(a.timestamp) - getTimestampValue(b.timestamp));
                let runningTotal = 0;
                const history = sortedLedger.map(tx => {
                    runningTotal += (tx.type === 'Credit' ? Number(tx.amount) : -Number(tx.amount));
                    return { val: runningTotal, date: getTimestampValue(tx.timestamp) };
                });
                const composition = clients.reduce((acc, c) => {
                    acc[c.entityType] = (acc[c.entityType] || 0) + 1;
                    return acc;
                }, {});
                return { totalRevenue, history, composition };
            }, [ledger, clients]);

            const anomalyTrend = useMemo(() => {
                const sorted = [...ledger].sort((a, b) => getTimestampValue(a.timestamp) - getTimestampValue(b.timestamp));
                const movements = sorted.map((tx) => ({
                    ...tx,
                    movement: tx.type === 'Credit' ? Number(tx.amount || 0) : -Number(tx.amount || 0),
                }));
                if (!movements.length) return [];

                return movements.map((row, idx) => {
                    const windowRows = movements.slice(Math.max(0, idx - 8), idx + 1);
                    const mean = windowRows.reduce((sum, item) => sum + item.movement, 0) / Math.max(1, windowRows.length);
                    const variance = windowRows.reduce((sum, item) => sum + Math.pow(item.movement - mean, 2), 0) / Math.max(1, windowRows.length);
                    const std = Math.sqrt(variance) || 1;
                    const z = Math.abs((row.movement - mean) / std);
                    const isAnomaly = z >= 2.1 || Math.abs(row.movement) >= 25000;
                    const confidence = Math.min(99, Math.max(51, Math.round(50 + z * 14)));
                    return {
                        id: row.id,
                        movement: row.movement,
                        clientName: row.clientName,
                        description: row.description,
                        timestamp: row.timestamp,
                        isAnomaly,
                        confidence,
                    };
                });
            }, [ledger]);

            const topAnomalies = useMemo(
                () => anomalyTrend.filter((a) => a.isAnomaly).sort((a, b) => b.confidence - a.confidence).slice(0, 6),
                [anomalyTrend]
            );

            const isHighRiskLedgerAction = useMemo(() => {
                const amt = Number(txForm.amount || 0);
                const highRiskText = /wire|override|sweep|manual|urgent|external/i.test(String(txForm.description || ''));
                return txForm.type === 'Debit' && (amt >= 10000 || highRiskText);
            }, [txForm]);

            const canExecuteHighRisk = operatorRole === 'owner' || operatorRole === 'admin';

            useEffect(() => {
                localStorage.setItem('skye.platinum.role', operatorRole);
            }, [operatorRole]);

            const notify = (msg) => {
                const id = Date.now();
                setNotifications(prev => [...prev, { id, msg }]);
                setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 4000);
            };

            const updateDirectiveState = (id, patch) => {
                setDirectiveWorkflow((old) => old.map((item) => (item.id === id ? { ...item, ...patch } : item)));
            };

            workspaceStateRef.current = { clients, ledger, kaixuAccessKey };

            if (!workspaceSyncRef.current && window.SkyeWorkspaceRecordSync && typeof window.SkyeWorkspaceRecordSync.create === 'function') {
                workspaceSyncRef.current = window.SkyeWorkspaceRecordSync.create({
                    appId,
                    recordApp: workspaceRecordApp,
                    wsId,
                    getState: () => workspaceStateRef.current,
                    applyState: (payload) => {
                        const model = payload && typeof payload === 'object' ? payload : {};
                        isApplyingRemoteRef.current = true;
                        setClients(Array.isArray(model.clients) ? model.clients.map(normalizeClient) : []);
                        setLedger(Array.isArray(model.ledger) ? sortLedgerEntries(model.ledger) : []);
                        const nextKey = typeof model.kaixuAccessKey === 'string' ? model.kaixuAccessKey : '';
                        setKaixuAccessKey(nextKey);
                        setTempKey(nextKey);
                        setSessionReady(true);
                        window.setTimeout(() => {
                            isApplyingRemoteRef.current = false;
                        }, 0);
                    },
                    serialize: (model) => ({
                        clients: (Array.isArray(model.clients) ? model.clients : []).map(normalizeClient),
                        ledger: sortLedgerEntries(model.ledger),
                        kaixuAccessKey: String(model.kaixuAccessKey || ''),
                    }),
                    deserialize: (payload) => (payload && typeof payload === 'object' ? payload : {}),
                    getTitle: () => 'Skye Platinum Workspace',
                    onLoadError: (error) => {
                        console.error('Workspace load failed', error);
                        setSessionReady(false);
                    },
                    onSaveError: (error) => {
                        console.error('Workspace save failed', error);
                        setSessionReady(false);
                    },
                });
            }

            const loadWorkspace = async (prompt = false) => {
                const sync = workspaceSyncRef.current;
                if (!sync) return null;
                const payload = await sync.load(prompt);
                setSessionReady(true);
                return payload;
            };

            const saveWorkspace = async (options = {}) => {
                const sync = workspaceSyncRef.current;
                if (!sync) return null;
                const result = await sync.save(options);
                if (result) setSessionReady(true);
                return result;
            };

            useEffect(() => {
                let isMounted = true;

                const hydrateWorkspace = async () => {
                    try {
                        await loadWorkspace(false);
                    } catch (error) {
                        console.error('Workspace hydration failed', error);
                    } finally {
                        if (isMounted) {
                            hasHydratedRef.current = true;
                            isApplyingRemoteRef.current = false;
                        }
                    }
                };

                hydrateWorkspace();

                return () => {
                    isMounted = false;
                    window.clearTimeout(autosaveTimerRef.current);
                };
            }, []);

            useEffect(() => {
                if (!hasHydratedRef.current || isApplyingRemoteRef.current) return;
                window.clearTimeout(autosaveTimerRef.current);
                autosaveTimerRef.current = window.setTimeout(() => {
                    saveWorkspace({ prompt: false, silent: true, successText: 'Synced' }).catch((error) => {
                        console.error('Autosave failed', error);
                    });
                }, 1500);

                return () => window.clearTimeout(autosaveTimerRef.current);
            }, [clients, ledger, kaixuAccessKey]);

            const handleSyncUnlock = async () => {
                try {
                    await loadWorkspace(true);
                    notify('Workspace sync unlocked');
                } catch (error) {
                    notify(error?.message || 'Workspace sync unavailable');
                }
            };

            const exportExecutiveReport = () => {
                const payload = {
                    generated_at: new Date().toISOString(),
                    app: 'SkyePlatinum',
                    executive_role: operatorRole,
                    summary: {
                        aggregate_protocol_value: analytics.totalRevenue,
                        entity_count: clients.length,
                        ledger_rows: ledger.length,
                        anomaly_count: topAnomalies.length,
                    },
                    insight: aiInsight,
                    directives: directiveWorkflow.map((d) => ({
                        id: d.id,
                        text: d.text,
                        status: d.status,
                        assignee: d.assignee,
                        source_reference: 'kAIxU Neural Link',
                    })),
                    anomaly_trend: topAnomalies.map((a) => ({
                        transaction_id: a.id,
                        confidence: a.confidence,
                        movement: a.movement,
                        client: a.clientName,
                        description: a.description,
                        source_reference: `ledger/${a.id}`,
                    })),
                    source_references: [
                        ...ledger.slice(0, 20).map((tx) => ({
                            kind: 'ledger',
                            id: tx.id,
                            amount: tx.amount,
                            type: tx.type,
                            client: tx.clientName,
                        })),
                        ...clients.slice(0, 20).map((c) => ({
                            kind: 'client',
                            id: c.id,
                            name: c.name,
                            entity_type: c.entityType,
                        })),
                    ],
                };

                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                const href = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = href;
                a.download = `skye-platinum-executive-report-${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(href);
                notify('Executive report exported with source references');
            };

            const gatewayFetch = (window.SkyeGateway && window.SkyeGateway.fetchWithRetry) || fetch;
            const telemetryEmit = (window.SkyeTelemetry && window.SkyeTelemetry.emit) || (async () => {});
            const errorFingerprint = (window.SkyeError && window.SkyeError.fingerprint) || (() => 'E-UNKNOWN');

            const getGatewayHeaders = () => {
                const headers = { "Content-Type": "application/json" };
                const corr = window.SkyeCorrelation && window.SkyeCorrelation.next ? window.SkyeCorrelation.next('skyeplatinum') : '';
                if (kaixuAccessKey && kaixuAccessKey.trim()) {
                    headers["Authorization"] = `Bearer ${kaixuAccessKey.trim()}`;
                }
                if (corr) headers["X-Correlation-Id"] = corr;
                return headers;
            };

            const generatekAIxUInsight = async () => {
                if (!kaixuAccessKey) return notify("kAIxU Key Required");
                const startedAt = Date.now();
                setIsGeneratingAi(true);
                try {
                    const response = await gatewayFetch("/api/kaixu-generate", {
                        method: "POST",
                        headers: getGatewayHeaders(),
                        body: JSON.stringify({
                            app: "SkyePlatinum",
                            format: "text",
                            system: "You are the kAIxU intelligence node. Provide a sharp 2-sentence fiscal summary and 3 actionable 'Directives' for the CEO.",
                            prompt: `Revenue: $${analytics.totalRevenue}. Entities: ${clients.length}.`
                        })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data?.error || data?.message || "kAIxU gateway failed");
                    const content = data.output || data.text || data.result || data.response || "";
                    const parts = content.split('\n').filter(p => p.trim());
                    setAiInsight(parts.slice(0, 2).join(' '));
                    const nextDirectives = parts.slice(2, 5).map(d => d.replace(/^\d\.?\s?/, '').trim()).filter(Boolean);

                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <select required value={txForm.clientId} onChange={(event) => setTxForm((old) => ({ ...old, clientId: event.target.value }))} className="bg-white/5 border border-white/10 p-4 rounded-2xl text-sm">
                                        <option value="">Select client</option>
                                        {clients.map((client) => <option key={client.id} value={client.id}>{client.name}</option>)}
                                    </select>
                                    <select required value={txForm.type} onChange={(event) => setTxForm((old) => ({ ...old, type: event.target.value }))} className="bg-white/5 border border-white/10 p-4 rounded-2xl text-sm">
                                        <option value="Credit">Credit</option>
                                        <option value="Debit">Debit</option>
                                    </select>
                                    <input required value={txForm.amount} onChange={(event) => setTxForm((old) => ({ ...old, amount: event.target.value }))} type="number" min="0" step="0.01" placeholder="Amount" className="bg-white/5 border border-white/10 p-4 rounded-2xl text-sm" />
                                    <input required value={txForm.description} onChange={(event) => setTxForm((old) => ({ ...old, description: event.target.value }))} placeholder="Description" className="bg-white/5 border border-white/10 p-4 rounded-2xl text-sm" />
                                </div>

                                {isHighRiskLedgerAction && !canExecuteHighRisk && (
                                    <div className="p-4 rounded-2xl border border-red-500/40 bg-red-500/10 text-red-300 text-[10px] font-black uppercase tracking-widest">
                                        Blocked: role={operatorRole.toUpperCase()} cannot submit high-risk ledger updates.
                                    </div>
                                )}

                                <div className="flex justify-end gap-3">
                                    <button type="button" onClick={() => setShowAddTransaction(false)} className="px-6 py-3 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-widest">Cancel</button>
                                    <button type="submit" className="px-8 py-3 rounded-2xl bg-yellow-500 text-black text-[10px] font-black uppercase tracking-widest">Commit Ledger Update</button>
                                </div>
                            </form>
                        </div>
                    )}

                    <footer className="relative z-50 py-10 text-center opacity-20 text-[8px] font-black tracking-[0.8em] uppercase border-t border-white/5">
                        SKye Platinum Hub • Quantum Command Protocol v7.5.0
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
