<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AE Login — Skyesol Access 222™</title>
  <link rel="manifest" href="/access-222/manifest.json" />
  <meta name="theme-color" content="#05030a" />
  <link rel="icon" href="/access-222/assets/icon-192.png" />
  <link rel="apple-touch-icon" href="/access-222/assets/icon-192.png" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="/access-222/assets/site.css" />
</head>
<body>
  <nav>
    <div class="container">
      <div class="nav-inner">
        <a class="brand" href="/access-222/ae/">
          <div class="mark" aria-hidden="true"><img src="/access-222/assets/logo.png" alt="" /></div>
          <div class="text">
            <div class="t">Skyesol Access 222™</div>
            <div class="s">AE Login</div>
          </div>
        </a>
        <div class="nav-links">
          <a class="pill" href="/access-222/ae/">Portal Home</a>
          <a class="pill" href="/">Public Site</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="hero">
      <div class="card">
        <div class="pad">
          <div class="kicker">ACCESS GATE</div>
          <h1>Passphrase required</h1>
          <p class="sub">Enter the AE passphrase to open the internal SOP.</p>

          <div class="form" style="grid-template-columns: 1fr;">
            <div class="field">
              <label>Passphrase</label>
              <input id="pw" type="password" placeholder="Enter passphrase" />
            </div>
          </div>

          <div class="actions">
            <button id="btn">Unlock SOP</button>
            <span class="mini" id="msg" aria-live="polite"></span>
          </div>

          <hr class="sep" />
          <div class="mini">
            Change the passphrase in <code>/access-222/ae/portal/portal.js</code>. This is intentionally simple.
          </div>

        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div>© <span data-year></span> Skyes Over London LC • Internal use only</div>
    </div>
  </footer>

  <script src="/access-222/assets/site.js"></script>
  <script src="/access-222/ae/portal/portal.js"></script>
  <script src="/access-222/assets/sky3d.js"></script>
  
  <script src="../../assets/app.js"></script></body>
</html>
