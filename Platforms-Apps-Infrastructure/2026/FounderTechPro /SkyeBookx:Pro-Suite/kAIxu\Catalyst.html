<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kAIxu Catalyst - Systems & Combat Architect</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.fb = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <style>
        /* PDF/PRINT ENGINE - CORE RULEBOOK STYLE */
        @media print {
            @page { margin: 0.5in; size: letter; }
            html, body { height: auto !important; overflow: visible !important; background: white !important; color: black !important; font-family: serif !important; }
            #navbar, #editor-container, #bg-canvas, .no-print, #toast-container, #tutorial-modal { display: none !important; visibility: hidden !important; }
            #preview-container { display: block !important; position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; padding: 0 !important; background: white !important; }
            #preview-content { display: block !important; width: 100% !important; }
            
            .system-entry { page-break-inside: avoid !important; border: 3px solid #ef4444; padding: 40px; margin-bottom: 50px; position: relative; }
            .print-header { border-bottom: 5px solid #ef4444; padding-bottom: 15px; margin-bottom: 30px; text-align: right; }
            .print-header h1 { font-size: 32pt; font-weight: 900; text-transform: uppercase; margin: 0; color: #ef4444; }
            
            .system-visual { width: 320px; border: 2px solid #ef4444; float: right; margin-left: 25px; margin-bottom: 15px; }
            .system-visual img { width: 100%; height: auto; display: block; }
            
            h2 { font-size: 26pt; font-weight: 900; margin-top: 0; color: #000; text-transform: uppercase; }
            .stat-block { background: #fee2e2 !important; padding: 20px; border: 1px solid #ef4444; margin-top: 20px; -webkit-print-color-adjust: exact; }
            .page-break { page-break-after: always; }
        }
        
        @keyframes pulseLogic {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .animate-logic { animation: pulseLogic 4s ease-in-out infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(239, 68, 68, 0.2); border-radius: 10px; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #020617; pointer-events: none; }

        .glass-sidebar { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(12px); border-right: 1px solid rgba(239, 68, 68, 0.1) !important; }
        .glass-nav { background: rgba(255, 255, 255, 0.98) !important; backdrop-filter: blur(16px); border-bottom: 2px solid #fee2e2 !important; }
        .editor-card { background: white !important; box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05); border: 1px solid #fecaca; }
        
        .nexus-link { @apply text-[10px] text-slate-500 hover:text-red-600 flex items-center gap-1.5 transition-colors py-0.5 font-bold uppercase tracking-tighter; }
        #tutorial-modal { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden font-sans">

    <div class="fixed inset-0 pointer-events-none border-[6px] border-yellow-400 shadow-[inset_0_0_30px_rgba(239, 68, 68, 0.1)] z-[100] no-print"></div>

        <div class="flex items-center gap-3">
            <img src="https://cdn1.sharemyimage.com/2026/02/16/logo1_transparent.png" alt="Logo" class="h-10 w-auto animate-logic">
            <h1 class="text-xl font-bold text-slate-900 tracking-tight uppercase">kAIxu Catalyst</h1>
        </div>

        <div class="flex-1 max-w-xl mx-8 flex items-center gap-3">
            <input type="text" id="proj-title-input" class="flex-1 text-center font-bold text-slate-800 bg-red-50 border-none rounded-lg py-2 px-4 outline-none focus:ring-2 focus:ring-red-500 transition-all" placeholder="System Rulebook Name">
            
            <div class="flex items-center gap-2 no-print">
                <button onclick="toggleTutorial(true)" class="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-2 transition-all">

    <!-- Editor Layout -->
    <div id="editor-container" class="flex flex-1 overflow-hidden">
        <div class="w-72 glass-sidebar flex flex-col z-10 flex-shrink-0 relative overflow-hidden">
            <div class="p-4 border-b border-red-100 relative z-10 flex flex-col gap-2 bg-white/50">
                <button onclick="addMechanism()" class="w-full flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white py-2.5 px-4 rounded-xl font-bold text-sm shadow-lg shadow-red-100 transition-all active:scale-95">

                <button onclick="generateFromScratch()" class="w-full flex items-center justify-center gap-2 bg-slate-900 hover:bg-black text-white py-2 px-4 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-md transition-all active:scale-95">
                    <i class="fa-solid fa-brain text-red-400"></i> Simulate From Scratch

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="exportToDevice()" class="bg-red-50 hover:bg-red-100 text-red-600 p-2 rounded-lg font-bold text-[10px] border border-red-100 transition-all">
                        <i class="fa-solid fa-download"></i> Save Project
                    </button>
                    <label class="bg-red-50 hover:bg-red-100 text-red-600 p-2 rounded-lg font-bold text-[10px] border border-red-100 cursor-pointer text-center transition-all">

            <!-- Nexus Network -->
            <div class="p-4 bg-slate-50/50 border-t border-slate-100 relative z-10 space-y-4">
                <div>
                    <h4 class="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-2">Sovereign Satellites</h4>
                    <div class="grid grid-cols-1 gap-0.5 max-h-24 overflow-y-auto pr-2">
                        <a href="https://skyesol.netlify.app/" target="_blank" class="nexus-link">SkyesSOL</a>
                        <a href="https://northstarofficexaccounting.netlify.app" target="_blank" class="nexus-link">NorthStar Office</a>
                        <a href="https://sole-nexus.netlify.app" target="_blank" class="nexus-link">SOLE Nexus</a>
                        <a href="https://skyefamilyhub.netlify.app/" target="_blank" class="nexus-link">Family Hub</a>
                    </div>
                </div>
                <div class="pt-2 border-t border-slate-200 text-[9px] font-bold text-slate-400">
                    <p>(480) 469-5416</p>
                    <p class="truncate uppercase tracking-tighter">SkyesOverLondonLC@SOLEnterprises.org</p>
                </div>
            </div>
            
            <!-- Baked-in Founder Graphic -->
            <div class="absolute bottom-0 left-0 w-full z-0 flex flex-col items-center pointer-events-none no-print pb-4">
                <div class="mb-2 px-3 py-1 border-2 border-red-400 rounded-lg bg-white/90 backdrop-blur-md text-[9px] font-black text-red-900 tracking-widest uppercase shadow-xl">
                    Skyes' The Limit
                </div>
                <img src="https://cdn1.sharemyimage.com/2026/03/03/Gemini_Generated_Image_5aft6s5aft6s5aft-1.png" alt="Founder" class="w-64 h-auto object-contain animate-logic opacity-100 drop-shadow-2xl">
            </div>
        </div>

        <div class="flex-1 flex flex-col relative bg-transparent overflow-y-auto" id="main-workspace">
            <div class="max-w-5xl mx-auto w-full p-8 lg:p-12 space-y-8 relative z-10">
                
                <input type="text" id="mech-title" class="w-full text-5xl font-black text-white bg-transparent border-none outline-none placeholder-white/20 focus:ring-0 drop-shadow-lg" placeholder="Mechanism Name">

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Logic Data -->
                    <div class="editor-card rounded-3xl overflow-hidden flex flex-col lg:col-span-2 relative">
                        <div class="p-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
                            <span class="font-bold text-slate-800 text-xs uppercase tracking-tight">System Logic</span>
                            <div class="flex gap-2">
                                <button onclick="processAI('mechanics')" class="text-[10px] bg-white border px-3 py-1 rounded-lg font-bold hover:bg-slate-50 transition-colors uppercase">Flesh Out Math</button>
                                <button onclick="processAI('skills')" class="text-[10px] bg-slate-900 text-white px-3 py-1 rounded-lg font-bold hover:bg-black transition-colors uppercase">Branch Skills</button>

                        </div>
                        
                        <div id="parsing-overlay" class="hidden absolute inset-0 bg-white/90 backdrop-blur-md z-10 flex flex-col items-center justify-center text-red-600">

                        </div>

                        <textarea id="mech-content" class="w-full h-full min-h-[400px] p-10 text-sm leading-relaxed border-none outline-none resize-none font-mono text-slate-700 bg-white" placeholder="Document the rules, combat dice, or character progression math here..."></textarea>

                    <!-- Visualization -->

                                Render UI

                                <option>Dialogue Engine</option>

                        </div>

                        </div>

                            <input type="text" id="mech-id-code" class="w-full bg-slate-50 border-none rounded-lg p-3 text-sm outline-none mt-1 font-bold text-slate-700" placeholder="CAT-001">

    <!-- Wired Preview & PDF Dossier -->
    <div id="preview-container" class="hidden flex-1 overflow-y-auto bg-slate-950 p-12 print:p-0">
        <div id="preview-content" class="max-w-[8.5in] mx-auto bg-white p-12 shadow-2xl print:shadow-none min-h-screen"></div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[110] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module">
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kaixu-catalyst-architect-wired';
        
        let state = {
            title: "Project Catalyst Core",
            mechanisms: [{ id: 'm-1', title: "KINETIC RESOLUTION", content: "The primary combat resolution loop. Players roll against target evasion using a velocity-based multiplier...", stats: "STR: 12\nDEX: 15\nSPD: 18", rng: "D20 + Velocity", complexity: "Crunchy / Hardcore", type: "Combat System", id_code: "CAT-001", image: null }],
            activeMechId: 'm-1',
            viewMode: "editor",
            openaiKey: ""
        };
        let user = null, isSaving = false, saveTimeout = null;

        const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot } = window.fb;
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Three.js Geometric Logic Background ---
        function initThreeJS() {
            const canvas = document.getElementById('bg-canvas');
            if(!canvas) return;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            const l1 = new THREE.PointLight(0xef4444, 5, 100); l1.position.set(10, 10, 10); scene.add(l1);
            const l2 = new THREE.PointLight(0x6366f1, 5, 100); l2.position.set(-10, -10, 10); scene.add(l2);
            
            const group = new THREE.Group();
            const polyGeo = new THREE.IcosahedronGeometry(0.5, 0);
            for (let i = 0; i < 50; i++) {
                const mat = new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0xef4444, emissiveIntensity: 1, transparent: true, opacity: 0.3, wireframe: true });
                const mesh = new THREE.Mesh(polyGeo, mat);
                mesh.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*30, (Math.random()-0.5)*15);
                mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                group.add(mesh);
            }
            scene.add(group);

            function animate() {
                requestAnimationFrame(animate);
                group.rotation.y += 0.001;
                group.rotation.x += 0.0005;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        async function init() {
            initThreeJS();
            document.getElementById('proj-title-input').addEventListener('input', e => { state.title = e.target.value; debouncedSave(); });
            document.getElementById('openai-key').addEventListener('input', e => { state.openaiKey = e.target.value; debouncedSave(); });
            
            const inputs = ['mech-title', 'mech-content', 'mech-stats', 'mech-type', 'mech-complexity', 'mech-rng', 'mech-id-code'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const field = id.split('-')[1].replace('id-code', 'id_code');
                el.addEventListener('input', e => { 
                    const mech = state.mechanisms.find(x => x.id === state.activeMechId);
                    if(mech) { mech[field] = e.target.value; if(field==='title') renderSidebar(); debouncedSave(); }
                });
                if(el.tagName === 'SELECT') el.addEventListener('change', e => {
                    const mech = state.mechanisms.find(x => x.id === state.activeMechId);
                    if(mech) { mech[field] = e.target.value; debouncedSave(); }
                });
            });
            document.getElementById('import-input').addEventListener('change', handleImport);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (err) { console.error("Auth Error", err); }

            onAuthStateChanged(auth, u => { 
                user = u; 
                if(user) syncCloud();
            });
            renderNav();
        }

        async function syncCloud() {
            if(!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'catalyst', 'current');
            onSnapshot(docRef, snap => {
                if (snap.exists() && !isSaving) {
                    const data = snap.data();
                    if (data.mechanisms && typeof data.mechanisms === 'string') {
                        try { data.mechanisms = JSON.parse(data.mechanisms); } catch(e) {}
                    }
                    state = { ...state, ...data };
                    refreshUI();
                }
            });
        }

        function debouncedSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveToCloud, 2000); }

        async function saveToCloud() {
            if (!user) return;
            isSaving = true;
            const statusEl = document.getElementById('sync-status');
            statusEl.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-red-500"></i> <span>Syncing...</span>';
            try {
                const jsonMechs = JSON.stringify(state.mechanisms);
                if (jsonMechs.length > 1000000) { statusEl.innerHTML = '<span class="text-amber-500">Local Only</span>'; return; }
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'catalyst', 'current');
                await setDoc(docRef, { ...state, mechanisms: jsonMechs }, { merge: true });
                statusEl.innerHTML = '<i class="fa-solid fa-link text-red-400"></i> <span>Synced</span>';
            } catch (err) { statusEl.innerHTML = '<span>Error</span>'; }
            finally { setTimeout(() => isSaving = false, 500); }
        }

        window.exportToDevice = () => {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${state.title.replace(/\s+/g, '_')}.catalyst`;
            link.click();
            showToast("Backup Saved!", "success");
        };

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    state = { ...state, ...JSON.parse(e.target.result) };
                    refreshUI(); debouncedSave();
                    showToast("System Reloaded!", "success");
                } catch (err) { showToast("Invalid file", "error"); }
            };
            reader.readAsText(file);
        }

        function refreshUI() {
            document.getElementById('proj-title-input').value = state.title;
            document.getElementById('openai-key').value = state.openaiKey || "";
            const mech = state.mechanisms.find(x => x.id === state.activeMechId) || state.mechanisms[0];
            if (!mech) return;
            document.getElementById('mech-title').value = mech.title;
            document.getElementById('mech-content').value = mech.content;
            document.getElementById('mech-stats').value = mech.stats;
            document.getElementById('mech-type').value = mech.type;
            document.getElementById('mech-complexity').value = mech.complexity;
            document.getElementById('mech-rng').value = mech.rng;
            document.getElementById('mech-id-code').value = mech.id_code;
            renderSidebar(); renderImageArea(mech);
        }

        function renderSidebar() {
            const list = document.getElementById('mechanism-list');
            list.innerHTML = state.mechanisms.map((m, idx) => `
                <div onclick="window.selectMech('${m.id}')" class="group p-3.5 rounded-xl cursor-pointer transition-all border ${state.activeMechId === m.id ? 'bg-red-600 border-red-600 text-white shadow-xl' : 'bg-white border-slate-100 hover:border-red-300 text-slate-600'}">
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <span class="text-[9px] font-black w-5 h-5 rounded flex items-center justify-center shrink-0 ${state.activeMechId === m.id ? 'bg-white text-red-600' : 'bg-slate-100 text-slate-400'}">${idx+1}</span>
                            <div class="overflow-hidden">
                                <span class="truncate text-xs font-bold uppercase block">${m.title || 'Untitled Mech'}</span>
                                <span class="text-[8px] opacity-60 font-mono">${m.id_code || '---'}</span>
                            </div>
                        </div>
                        <button onclick="window.deleteMech('${m.id}', event)" class="opacity-0 group-hover:opacity-100 text-red-500"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderImageArea(mech) {
            const area = document.getElementById('mech-image-area');
            if (mech.image) {
                area.innerHTML = `<img src="${mech.image}" class="w-full h-full object-cover">
                <button onclick="window.removeImage()" class="absolute opacity-0 group-hover:opacity-100 bg-black/60 text-white p-2 rounded-lg text-[10px] backdrop-blur-md">Remove</button>`;
            } else {
                area.innerHTML = `<p class="text-slate-300 font-black uppercase text-[10px] tracking-widest text-center">kAIxu System Queue</p>`;
            }
        }

        function renderNav() {
            const actions = document.getElementById('nav-actions');
            if (state.viewMode === 'editor') {
                actions.innerHTML = `<button onclick="window.setViewMode('preview')" class="bg-red-600 hover:bg-red-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl transition-all">Compile Rulebook</button>`;
            } else {
                actions.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="window.setViewMode('editor')" class="bg-white border-2 border-slate-200 text-slate-700 py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest">Editor</button>
                        <button onclick="window.generatePDF()" class="bg-red-600 hover:bg-red-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl">Export PDF</button>
                    </div>`;
            }
        }

        window.generatePDF = () => { window.focus(); window.print(); };

        // --- OPENAI EXCLUSIVE WIRED LOGIC ---
        async function fetchOpenAI(prompt, system) {
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) throw new Error("Kaixu Key required.");
            const res = await fetch('/.netlify/functions/gateway-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ model: "gpt-4o", messages: [{ role: "system", content: system }, { role: "user", content: prompt }] })
            });
            if (!res.ok) throw new Error("API Link Failure");
            const data = await res.json();
            return data.choices[0].message.content;
        }

        window.generateFromScratch = async () => {
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Calculating System...";
            try {
                const prompt = "Generate a unique game system mechanism or RPG rule-set. Return a JSON object with: title, content, stats (sample attribute list), type (one of: Combat System, Skill Progression, Economic Loop, Dialogue Engine, Resource Management), complexity (one of: Rules Lite, Crunchy / Hardcore, Simulated, Abstract), rng (RNG method like 2d20), id_code. No markdown.";
                const result = await fetchOpenAI(prompt, "You are a master game mechanics designer. Respond in raw JSON format only.");
                const parsed = JSON.parse(result.replace(/```json|```/g, "").trim());
                const id = 'm-' + Date.now();
                state.mechanisms.push({ id, ...parsed, image: null });
                state.activeMechId = id;
                refreshUI(); debouncedSave();
                showToast("System Mechanism Architected!", "success");
            } catch (err) { showToast("Simulation failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Simulating..."; }
        };

        window.processAI = async (type) => {
            const m = state.mechanisms.find(x => x.id === state.activeMechId);
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            try {
                const prompt = `Expand the system ${type} for this mechanism. Subject: ${m.title}. Type: ${m.type}. Current Rule-Set: ${m.content}. Format as a formal technical game design document or core rulebook entry.`;
                const result = await fetchOpenAI(prompt, "You are a world-class systems designer and RPG developer.");
                m.content += "\n\n" + result;
                refreshUI(); debouncedSave();
                showToast("Logic expanded!", "success");
            } catch (err) { showToast("Link failure", "error"); }
            finally { overlay.classList.add('hidden'); }
        };

        window.generateVisual = async () => {
            const m = state.mechanisms.find(x => x.id === state.activeMechId);
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) return showToast("API Key required!", "error");
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Rendering UI...";
            try {
                const prompt = `Futuristic gaming UI interface, holographic skill tree, combat HUD design, complex geometric dashboard, high-fidelity digital art, UI design for system: ${m.title}. Type: ${m.type}. Theme: Neon Logic.`;
                const res = await fetch('/.netlify/functions/gateway-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: "dall-e-3", prompt, n: 1, response_format: "b64_json" })
                });
                const data = await res.json();
                m.image = `data:image/png;base64,${data.data[0].b64_json}`;
                refreshUI(); debouncedSave();
                showToast("System UI Rendered!", "success");
            } catch (err) { showToast("Render failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Simulating..."; }
        };

        // --- Utils ---
        window.addMechanism = () => {
            const id = 'm-' + Date.now();
            state.mechanisms.push({ id, title: "NEW_MECHANISM", content: "", stats: "", type: "Combat System", complexity: "Standard", rng: "N/A", id_code: "CAT-NEW", image: null });
            state.activeMechId = id; refreshUI(); debouncedSave();
        };
        window.selectMech = (id) => { state.activeMechId = id; refreshUI(); };
        window.deleteMech = (id, e) => { e.stopPropagation(); if(state.mechanisms.length <= 1) return; state.mechanisms = state.mechanisms.filter(x => x.id !== id); if(state.activeMechId === id) state.activeMechId = state.mechanisms[0].id; refreshUI(); debouncedSave(); };
        window.removeImage = () => { const m = state.mechanisms.find(x => x.id === state.activeMechId); if(m) m.image = null; refreshUI(); debouncedSave(); };
        window.setViewMode = (mode) => { 
            state.viewMode = mode; 
            if(mode === 'preview') { document.getElementById('editor-container').classList.add('hidden'); document.getElementById('preview-container').classList.remove('hidden'); compilePreview(); } 
            else { document.getElementById('editor-container').classList.remove('hidden'); document.getElementById('preview-container').classList.add('hidden'); } renderNav(); 
        };

        function compilePreview() {
            const cont = document.getElementById('preview-content');
            let html = `
            <div class="print-header">
                <h1>${state.title}</h1>
                <p style="font-weight: 800; font-size: 10pt; color: #64748b; text-transform: uppercase; font-family:serif;">Official Core Rulebook | kAIxu Catalyst Studio</p>
            </div>`;
            
            state.mechanisms.forEach(m => {
                html += `
                <div class="system-entry">
                    ${m.image ? `<div class="system-visual"><img src="${m.image}"></div>` : ''}
                    <h2>LOGIC: ${m.title}</h2>
                    <div style="margin-bottom: 20px;">
                        <p style="font-size: 10pt; margin-bottom: 5px;"><b>SYSTEM ID:</b> ${m.id_code}</p>
                        <p style="font-size: 10pt; margin-bottom: 5px;"><b>CLASS:</b> ${m.type} / ${m.complexity}</p>
                        <p style="font-size: 10pt; margin-bottom: 20px;"><b>RNG ENGINE:</b> ${m.rng}</p>
                    </div>
                    
                    <div class="prose prose-sm font-mono text-slate-700 leading-relaxed" style="clear: both; margin-top: 30px; border-top: 2px solid #ef4444; padding-top: 20px;">
                        <p style="font-weight: 900; text-transform: uppercase; font-size: 8pt; color: #ef4444; margin-bottom: 10px;">Rule-Set Documentation:</p>
                        ${m.content.split('\n\n').map(p => `<p style="margin-bottom:10px;">${p}</p>`).join('')}
                    </div>

                    <div class="stat-block">
                        <p style="font-weight: 900; text-transform: uppercase; font-size: 8pt; color: #ef4444; margin-bottom: 10px;">Attribute Calibration:</p>
                        <p style="font-family: monospace; white-space: pre-wrap;">${m.stats}</p>
                    </div>
                </div>`;
            });
            cont.innerHTML = html;
        }

        window.toggleTutorial = (show) => document.getElementById('tutorial-modal').classList.toggle('hidden', !show);

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `flex items-center gap-3 px-8 py-4 rounded-2xl shadow-2xl font-black text-xs uppercase tracking-widest transition-all animate-bounce ${type === 'error' ? 'bg-red-600' : 'bg-red-500'} text-white z-[200]`;
            t.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { t.classList.add('opacity-0', 'translate-x-full'); setTimeout(() => t.remove(), 500); }, 3000);
        }

        window.onload = init;
    </script>
<script src="./suite-gateway-nav.js"></script>
</body>
</html>
