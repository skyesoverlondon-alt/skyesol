<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.fb = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };

    <style>
        /* PDF/PRINT ENGINE - FULLY WIRED */
        @media print {
            @page { margin: 0.75in; size: letter; }
            html, body { height: auto !important; overflow: visible !important; background: white !important; color: black !important; }
            #navbar, #editor-container, #bg-canvas, .no-print, #toast-container, #tutorial-modal { display: none !important; visibility: hidden !important; }
            #preview-container { display: block !important; position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; padding: 0 !important; background: white !important; }
            #preview-content { display: block !important; width: 100% !important; }
            
            .myth-entry { page-break-inside: avoid !important; border-bottom: 2px solid #000; padding-bottom: 50px; margin-bottom: 50px; }
            .print-header { border-bottom: 4px solid #000; padding-bottom: 20px; margin-bottom: 40px; text-align: center; }
            .print-header h1 { font-size: 36pt; font-weight: 900; text-transform: uppercase; margin: 0; }
            
            .avatar-cell { width: 300px; float: right; margin-left: 30px; border: 5px solid #000; }
            .avatar-cell img { width: 100%; height: auto; display: block; }
            
            h2 { font-size: 28pt; font-weight: 900; margin-top: 0; color: #000; text-transform: uppercase; }
            .domain-tag { font-weight: 800; font-size: 10pt; text-transform: uppercase; background: #eee !important; padding: 4px 12px; margin-right: 10px; -webkit-print-color-adjust: exact; }
            .page-break { page-break-after: always; }
        }
        
        @keyframes floatPulse {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.02); }
        }
        .animate-float-pulse { animation: floatPulse 4s ease-in-out infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #020617; pointer-events: none; }

        .glass-sidebar { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(12px); border-right: 1px solid rgba(0,0,0,0.1) !important; }
        .glass-nav { background: rgba(255, 255, 255, 0.98) !important; backdrop-filter: blur(16px); border-bottom: 2px solid #e2e8f0 !important; }
        .editor-card { background: white !important; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        
        .nexus-link { @apply text-[10px] text-slate-500 hover:text-indigo-600 flex items-center gap-1.5 transition-colors py-0.5 font-bold uppercase tracking-tighter; }
        #tutorial-modal { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); }
    </style>
</head>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[110] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module">
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kaixu-mythos-architect-wired';
        
        let state = {
            title: "Codex Divina",
            deities: [{ id: 'd-1', title: "KAIXU THE ARCHITECT", content: "The primordial force of creation and digital sequence...", symbols: "A Golden Ring, A Floating Prism", domain: "Creation", alignment: "Pure Order", power: "Primordial Entity", followers: "The Sentinels", image: null }],
            activeDeityId: 'd-1',
            viewMode: "editor",
            openaiKey: ""
        };
        let user = null, isSaving = false, saveTimeout = null;

        const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot } = window.fb;
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Three.js Celestial Background ---
        function initThreeJS() {
            const canvas = document.getElementById('bg-canvas');
            if(!canvas) return;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            const l1 = new THREE.PointLight(0x6366f1, 5, 100); l1.position.set(10, 10, 10); scene.add(l1);
            const l2 = new THREE.PointLight(0xfacc15, 5, 100); l2.position.set(-10, -10, 10); scene.add(l2);
            
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for (let i = 0; i < 2000; i++) {
                starPos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.8 });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            function animate() {
                requestAnimationFrame(animate);
                stars.rotation.y += 0.0005;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        async function init() {
            initThreeJS();
            document.getElementById('proj-title-input').addEventListener('input', e => { state.title = e.target.value; debouncedSave(); });
            document.getElementById('openai-key').addEventListener('input', e => { state.openaiKey = e.target.value; debouncedSave(); });
            
            const inputs = ['deity-title', 'deity-content', 'deity-symbols', 'deity-domain', 'deity-alignment', 'deity-power', 'deity-followers'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const field = id.split('-')[1];
                el.addEventListener('input', e => { 
                    const d = state.deities.find(x => x.id === state.activeDeityId);
                    if(d) { d[field] = e.target.value; if(field==='title') renderSidebar(); debouncedSave(); }
                });
                if(el.tagName === 'SELECT') el.addEventListener('change', e => {
                    const d = state.deities.find(x => x.id === state.activeDeityId);
                    if(d) { d[field] = e.target.value; debouncedSave(); }
                });
            });
            document.getElementById('import-input').addEventListener('change', handleImport);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (err) { console.error("Auth Error", err); }

            onAuthStateChanged(auth, u => { 
                user = u; 
                if(user) syncCloud();
            });
            renderNav();
        }

        async function syncCloud() {
            if(!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'mythos', 'current');
            onSnapshot(docRef, snap => {
                if (snap.exists() && !isSaving) {
                    const data = snap.data();
                    if (data.deities && typeof data.deities === 'string') {
                        try { data.deities = JSON.parse(data.deities); } catch(e) {}
                    }
                    state = { ...state, ...data };
                    refreshUI();
                }
            });
        }

        function debouncedSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveToCloud, 2000); }

        async function saveToCloud() {
            if (!user) return;
            isSaving = true;
            const statusEl = document.getElementById('sync-status');
            statusEl.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-indigo-500"></i> <span>Syncing...</span>';
            try {
                const jsonDeities = JSON.stringify(state.deities);
                if (jsonDeities.length > 1000000) { statusEl.innerHTML = '<span class="text-amber-500">Local Only</span>'; return; }
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'mythos', 'current');
                await setDoc(docRef, { ...state, deities: jsonDeities }, { merge: true });
                statusEl.innerHTML = '<i class="fa-solid fa-cloud text-indigo-400"></i> <span>Synced</span>';
            } catch (err) { statusEl.innerHTML = '<span>Error</span>'; }
            finally { setTimeout(() => isSaving = false, 500); }
        }

        window.exportToDevice = () => {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${state.title.replace(/\s+/g, '_')}.mythos`;
            link.click();
            showToast("Archive Saved!", "success");
        };

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    state = { ...state, ...JSON.parse(e.target.result) };
                    refreshUI(); debouncedSave();
                    showToast("Mythos Loaded!", "success");
                } catch (err) { showToast("Invalid file", "error"); }
            };
            reader.readAsText(file);
        }

        function refreshUI() {
            document.getElementById('proj-title-input').value = state.title;
            document.getElementById('openai-key').value = state.openaiKey || "";
            const d = state.deities.find(x => x.id === state.activeDeityId) || state.deities[0];
            if (!d) return;
            document.getElementById('deity-title').value = d.title;
            document.getElementById('deity-content').value = d.content;
            document.getElementById('deity-symbols').value = d.symbols;
            document.getElementById('deity-domain').value = d.domain;
            document.getElementById('deity-alignment').value = d.alignment;
            document.getElementById('deity-power').value = d.power;
            document.getElementById('deity-followers').value = d.followers;
            renderSidebar(); renderImageArea(d);
        }

        function renderSidebar() {
            const list = document.getElementById('deity-list');
            list.innerHTML = state.deities.map((d, idx) => `
                <div onclick="window.selectDeity('${d.id}')" class="group p-3.5 rounded-xl cursor-pointer transition-all border ${state.activeDeityId === d.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl' : 'bg-white border-slate-100 hover:border-indigo-300 text-slate-600'}">
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <span class="text-[9px] font-black w-5 h-5 rounded flex items-center justify-center shrink-0 ${state.activeDeityId === d.id ? 'bg-white text-indigo-600' : 'bg-slate-100 text-slate-400'}">${idx+1}</span>
                            <span class="truncate text-xs font-bold uppercase">${d.title || 'Untitled God'}</span>
                        </div>
                        <button onclick="window.deleteDeity('${d.id}', event)" class="opacity-0 group-hover:opacity-100 text-red-500"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderImageArea(deity) {
            const area = document.getElementById('deity-image-area');
            if (deity.image) {
                area.innerHTML = `<img src="${deity.image}" class="w-full h-full object-cover">
                <button onclick="window.removeImage()" class="absolute opacity-0 group-hover:opacity-100 bg-black/60 text-white p-2 rounded-lg text-[10px] backdrop-blur-md">Remove</button>`;
            } else {
                area.innerHTML = `<p class="text-slate-300 font-black uppercase text-[10px] tracking-widest text-center">kAIxu Imagery Queue</p>`;
            }
        }

        function renderNav() {
            const actions = document.getElementById('nav-actions');
            if (state.viewMode === 'editor') {
                actions.innerHTML = `<button onclick="window.setViewMode('preview')" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl transition-all">Compile Scripture</button>`;
            } else {
                actions.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="window.setViewMode('editor')" class="bg-white border-2 border-slate-200 text-slate-700 py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest">Editor</button>
                        <button onclick="window.generatePDF()" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl">Export PDF</button>
                    </div>`;
            }
        }

        window.generatePDF = () => { window.focus(); window.print(); };

        // --- OPENAI EXCLUSIVE WIRED LOGIC ---
        async function fetchOpenAI(prompt, system) {
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) throw new Error("Kaixu Key required.");
            const res = await fetch('/.netlify/functions/gateway-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ model: "gpt-4o", messages: [{ role: "system", content: system }, { role: "user", content: prompt }] })
            });
            if (!res.ok) throw new Error("API Failure");
            const data = await res.json();
            return data.choices[0].message.content;
        }

        window.generateFromScratch = async () => {
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Concieving Deity...";
            try {
                const prompt = "Generate a unique deity for a fantasy or sci-fi mythology. Return a JSON object with: title, content, symbols, domain, alignment (select from Pure Order, Benevolent, Neutral, Malevolent, Eldritch / Chaos), power (select from Lesser Spirit, Demi-God, Major Deity, Primordial Entity), followers. No markdown.";
                const result = await fetchOpenAI(prompt, "You are a master of mythology. Respond in raw JSON format only.");
                const parsed = JSON.parse(result.replace(/```json|```/g, "").trim());
                const id = 'd-' + Date.now();
                state.deities.push({ id, ...parsed, image: null });
                state.activeDeityId = id;
                refreshUI(); debouncedSave();
                showToast("Divine Entity Conceived!", "success");
            } catch (err) { showToast("Evolution failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Channeling..."; }
        };

        window.processAI = async (type) => {
            const d = state.deities.find(x => x.id === state.activeDeityId);
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            try {
                const prompt = `Expand the divine ${type} for this deity. Name: ${d.title}. Domain: ${d.domain}. Current Lore: ${d.content}. Format as ancient epic scripture or modern mythological research.`;
                const result = await fetchOpenAI(prompt, "You are a master storyteller and mythologist.");
                d.content += "\n\n" + result;
                refreshUI(); debouncedSave();
                showToast("Lore expanded!", "success");
            } catch (err) { showToast("AI connection failed", "error"); }
            finally { overlay.classList.add('hidden'); }
        };

        window.generateVisual = async () => {
            const d = state.deities.find(x => x.id === state.activeDeityId);
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) return showToast("API Key required!", "error");
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Rendering Aspect...";
            try {
                const prompt = `Hyper-detailed cinematic master portrait of a deity: ${d.title}. Domain: ${d.domain}. Visual motifs: ${d.symbols}. High-fidelity digital painting, dramatic divine lighting, epic composition.`;
                const res = await fetch('/.netlify/functions/gateway-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: "dall-e-3", prompt, n: 1, response_format: "b64_json" })
                });
                const data = await res.json();
                d.image = `data:image/png;base64,${data.data[0].b64_json}`;
                refreshUI(); debouncedSave();
                showToast("Aspect Rendered!", "success");
            } catch (err) { showToast("Render failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Channeling..."; }
        };

        // --- Utils ---
        window.addDeity = () => {
            const id = 'd-' + Date.now();
            state.deities.push({ id, title: "NEW DEITY", content: "", symbols: "", domain: "Unknown", alignment: "Neutral", power: "Major Deity", followers: "Anonymous", image: null });
            state.activeDeityId = id; refreshUI(); debouncedSave();
        };
        window.selectDeity = (id) => { state.activeDeityId = id; refreshUI(); };
        window.deleteDeity = (id, e) => { e.stopPropagation(); if(state.deities.length <= 1) return; state.deities = state.deities.filter(x => x.id !== id); if(state.activeDeityId === id) state.activeDeityId = state.deities[0].id; refreshUI(); debouncedSave(); };
        window.removeImage = () => { const d = state.deities.find(x => x.id === state.activeDeityId); if(d) d.image = null; refreshUI(); debouncedSave(); };
        window.setViewMode = (mode) => { 
            state.viewMode = mode; 
            if(mode === 'preview') { document.getElementById('editor-container').classList.add('hidden'); document.getElementById('preview-container').classList.remove('hidden'); compilePreview(); } 
            else { document.getElementById('editor-container').classList.remove('hidden'); document.getElementById('preview-container').classList.add('hidden'); } renderNav(); 
        };

        function compilePreview() {
            const cont = document.getElementById('preview-content');
            let html = `
            <div class="print-header">
                <h1>${state.title}</h1>
                <p style="font-weight: 800; font-size: 10pt; color: #64748b; text-transform: uppercase;">Official Pantheon Records | kAIxu Mythos Studio</p>
            </div>`;
            
            state.deities.forEach(d => {
                html += `
                <div class="myth-entry">
                    ${d.image ? `<div class="avatar-cell"><img src="${d.image}"></div>` : ''}
                    <h2>${d.title}</h2>
                    <div style="margin-bottom: 20px;">
                        <span class="domain-tag">${d.domain}</span>
                        <span class="domain-tag">${d.power}</span>
                        <span class="domain-tag">${d.alignment}</span>
                    </div>
                    <div class="prose prose-sm font-serif text-slate-700 leading-relaxed" style="max-width: 60%;">
                        ${d.content.split('\n\n').map(p => `<p>${p}</p>`).join('')}
                    </div>
                    <div style="margin-top: 30px; padding: 20px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; clear: both;">
                        <p style="margin: 0; font-weight: 900; font-size: 8pt; text-transform: uppercase; color: #64748b;">Followers & Cults</p>
                        <p style="margin: 5px 0 15px; font-weight: 700;">${d.followers}</p>
                        <p style="margin: 0; font-weight: 900; font-size: 8pt; text-transform: uppercase; color: #64748b;">Sacred Symbols</p>
                        <p style="margin: 5px 0 0; font-family: monospace; font-size: 10pt;">${d.symbols}</p>
                    </div>
                </div>`;
            });
            cont.innerHTML = html;
        }

        window.toggleTutorial = (show) => document.getElementById('tutorial-modal').classList.toggle('hidden', !show);

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `flex items-center gap-3 px-8 py-4 rounded-2xl shadow-2xl font-black text-xs uppercase tracking-widest transition-all animate-bounce ${type === 'error' ? 'bg-red-600' : 'bg-indigo-600'} text-white z-[200]`;
            t.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { t.classList.add('opacity-0', 'translate-x-full'); setTimeout(() => t.remove(), 500); }, 3000);
        }

        window.onload = init;
    </script>
<script src="./suite-gateway-nav.js"></script>
</body>
</html>
