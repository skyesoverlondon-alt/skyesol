<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kAIxu Grimoire - Magic & Spellcraft Architect</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.fb = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <style>
        /* PDF/PRINT ENGINE - ANCIENT SPELLBOOK STYLE */
        @media print {
            @page { margin: 0.75in; size: letter; }
            html, body { height: auto !important; overflow: visible !important; background: white !important; color: black !important; font-family: serif !important; }
            #navbar, #editor-container, #bg-canvas, .no-print, #toast-container, #tutorial-modal { display: none !important; visibility: hidden !important; }
            #preview-container { display: block !important; position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; padding: 0 !important; background: white !important; }
            #preview-content { display: block !important; width: 100% !important; }
            
            .spell-entry { page-break-inside: avoid !important; border: 2px solid #6366f1; padding: 40px; margin-bottom: 50px; position: relative; border-radius: 15px; }
            .print-header { border-bottom: 5px double #6366f1; padding-bottom: 15px; margin-bottom: 30px; text-align: center; }
            .print-header h1 { font-size: 34pt; font-weight: 900; text-transform: uppercase; margin: 0; color: #4338ca; }
            
            .spell-visual { width: 280px; border: 2px solid #6366f1; float: right; margin-left: 20px; border-radius: 10px; }
            .spell-visual img { width: 100%; height: auto; display: block; border-radius: 8px; }
            
            h2 { font-size: 24pt; font-weight: 900; margin-top: 0; color: #4338ca; text-transform: uppercase; }
            .tag { border: 1px solid #6366f1; padding: 4px 12px; font-weight: 800; display: inline-block; margin-right: 10px; font-size: 9pt; background: #eef2ff !important; -webkit-print-color-adjust: exact; border-radius: 4px; }
            .page-break { page-break-after: always; }
        }
        
        @keyframes vortexPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.9; }
        }
        .animate-vortex { animation: vortexPulse 4s ease-in-out infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 10px; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #020617; pointer-events: none; }

        .glass-sidebar { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(12px); border-right: 1px solid rgba(99, 102, 241, 0.1) !important; }
        .glass-nav { background: rgba(255, 255, 255, 0.98) !important; backdrop-filter: blur(16px); border-bottom: 2px solid #eef2ff !important; }
        .editor-card { background: white !important; box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05); border: 1px solid #e0e7ff; }
        
        .nexus-link { @apply text-[10px] text-slate-500 hover:text-indigo-600 flex items-center gap-1.5 transition-colors py-0.5 font-bold uppercase tracking-tighter; }
        #tutorial-modal { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); }
    </style>
</head>

    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[110] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module">
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kaixu-grimoire-architect-wired';
        
        let state = {
            title: "Tome of the Void",
            spells: [{ id: 's-1', title: "KAIXU'S RADIANCE", content: "A beam of pure analytical light that strips away illusions and reveals the underlying logic of any object...", components: "A focused lens, binary chant", school: "Logic / Light", tier: "Master Class", time: "Instant", risk: "Stable", image: null }],
            activeSpellId: 's-1',
            viewMode: "editor",
            openaiKey: ""
        };
        let user = null, isSaving = false, saveTimeout = null;

        const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot } = window.fb;
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Three.js Arcane Singularity Background ---
        function initThreeJS() {
            const canvas = document.getElementById('bg-canvas');
            if(!canvas) return;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            const l1 = new THREE.PointLight(0x6366f1, 5, 100); l1.position.set(10, 10, 10); scene.add(l1);
            const l2 = new THREE.PointLight(0xec4899, 5, 100); l2.position.set(-10, -10, 10); scene.add(l2);
            
            const group = new THREE.Group();
            const particleGeo = new THREE.SphereGeometry(0.05, 8, 8);
            for (let i = 0; i < 300; i++) {
                const mat = new THREE.MeshStandardMaterial({ color: 0x6366f1, emissive: 0x6366f1, emissiveIntensity: 2, transparent: true, opacity: 0.5 });
                const mesh = new THREE.Mesh(particleGeo, mat);
                const r = 5 + Math.random() * 5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                mesh.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
                group.add(mesh);
            }
            scene.add(group);

            function animate() {
                requestAnimationFrame(animate);
                group.rotation.y += 0.002;
                group.rotation.z += 0.001;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        async function init() {
            initThreeJS();
            document.getElementById('proj-title-input').addEventListener('input', e => { state.title = e.target.value; debouncedSave(); });
            document.getElementById('openai-key').addEventListener('input', e => { state.openaiKey = e.target.value; debouncedSave(); });
            
            const inputs = ['spell-title', 'spell-content', 'spell-components', 'spell-school', 'spell-tier', 'spell-time', 'spell-risk'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const field = id.split('-')[1];
                el.addEventListener('input', e => { 
                    const spell = state.spells.find(x => x.id === state.activeSpellId);
                    if(spell) { spell[field] = e.target.value; if(field==='title') renderSidebar(); debouncedSave(); }
                });
                if(el.tagName === 'SELECT') el.addEventListener('change', e => {
                    const spell = state.spells.find(x => x.id === state.activeSpellId);
                    if(spell) { spell[field] = e.target.value; debouncedSave(); }
                });
            });
            document.getElementById('import-input').addEventListener('change', handleImport);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (err) { console.error("Auth Error", err); }

            onAuthStateChanged(auth, u => { 
                user = u; 
                if(user) syncCloud();
            });
            renderNav();
        }

        async function syncCloud() {
            if(!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'grimoire', 'current');
            onSnapshot(docRef, snap => {
                if (snap.exists() && !isSaving) {
                    const data = snap.data();
                    if (data.spells && typeof data.spells === 'string') {
                        try { data.spells = JSON.parse(data.spells); } catch(e) {}
                    }
                    state = { ...state, ...data };
                    refreshUI();
                }
            });
        }

        function debouncedSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveToCloud, 2000); }

        async function saveToCloud() {
            if (!user) return;
            isSaving = true;
            const statusEl = document.getElementById('sync-status');
            statusEl.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-indigo-500"></i> <span>Syncing...</span>';
            try {
                const jsonSpells = JSON.stringify(state.spells);
                if (jsonSpells.length > 1000000) { statusEl.innerHTML = '<span class="text-amber-500">Local Only</span>'; return; }
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'grimoire', 'current');
                await setDoc(docRef, { ...state, spells: jsonSpells }, { merge: true });
                statusEl.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles text-indigo-400"></i> <span>Synced</span>';
            } catch (err) { statusEl.innerHTML = '<span>Error</span>'; }
            finally { setTimeout(() => isSaving = false, 500); }
        }

        window.exportToDevice = () => {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${state.title.replace(/\s+/g, '_')}.grimoire`;
            link.click();
            showToast("Project Data Saved!", "success");
        };

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    state = { ...state, ...JSON.parse(e.target.result) };
                    refreshUI(); debouncedSave();
                    showToast("Grimoire Loaded!", "success");
                } catch (err) { showToast("Invalid file", "error"); }
            };
            reader.readAsText(file);
        }

        function refreshUI() {
            document.getElementById('proj-title-input').value = state.title;
            document.getElementById('openai-key').value = state.openaiKey || "";
            const spell = state.spells.find(x => x.id === state.activeSpellId) || state.spells[0];
            if (!spell) return;
            document.getElementById('spell-title').value = spell.title;
            document.getElementById('spell-content').value = spell.content;
            document.getElementById('spell-components').value = spell.components;
            document.getElementById('spell-school').value = spell.school;
            document.getElementById('spell-tier').value = spell.tier;
            document.getElementById('spell-time').value = spell.time;
            document.getElementById('spell-risk').value = spell.risk;
            renderSidebar(); renderImageArea(spell);
        }

        function renderSidebar() {
            const list = document.getElementById('spell-list');
            list.innerHTML = state.spells.map((s, idx) => `
                <div onclick="window.selectSpell('${s.id}')" class="group p-3.5 rounded-xl cursor-pointer transition-all border ${state.activeSpellId === s.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl' : 'bg-white border-slate-100 hover:border-indigo-300 text-slate-600'}">
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <span class="text-[9px] font-black w-5 h-5 rounded flex items-center justify-center shrink-0 ${state.activeSpellId === s.id ? 'bg-white text-indigo-600' : 'bg-slate-100 text-slate-400'}">${idx+1}</span>
                            <span class="truncate text-xs font-bold uppercase block">${s.title || 'Untitled Spell'}</span>
                        </div>
                        <button onclick="window.deleteSpell('${s.id}', event)" class="opacity-0 group-hover:opacity-100 text-red-500"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderImageArea(spell) {
            const area = document.getElementById('spell-image-area');
            if (spell.image) {
                area.innerHTML = `<img src="${spell.image}" class="w-full h-full object-cover">
                <button onclick="window.removeImage()" class="absolute opacity-0 group-hover:opacity-100 bg-black/60 text-white p-2 rounded-lg text-[10px] backdrop-blur-md">Remove</button>`;
            } else {
                area.innerHTML = `<p class="text-slate-300 font-black uppercase text-[10px] tracking-widest text-center">kAIxu Manifest Queue</p>`;
            }
        }

        function renderNav() {
            const actions = document.getElementById('nav-actions');
            if (state.viewMode === 'editor') {
                actions.innerHTML = `<button onclick="window.setViewMode('preview')" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl transition-all">Compile Tome</button>`;
            } else {
                actions.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="window.setViewMode('editor')" class="bg-white border-2 border-slate-200 text-slate-700 py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest">Editor</button>
                        <button onclick="window.generatePDF()" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl">Export PDF</button>
                    </div>`;
            }
        }

        window.generatePDF = () => { window.focus(); window.print(); };

        // --- OPENAI EXCLUSIVE WIRED LOGIC ---
        async function fetchOpenAI(prompt, system) {
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) throw new Error("Kaixu Key required.");
            const res = await fetch('/.netlify/functions/gateway-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ model: "gpt-4o", messages: [{ role: "system", content: system }, { role: "user", content: prompt }] })
            });
            if (!res.ok) throw new Error("API Link Failure");
            const data = await res.json();
            return data.choices[0].message.content;
        }

        window.generateFromScratch = async () => {
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Concieving Spell...";
            try {
                const prompt = "Generate a unique magic spell for a world. Return a JSON object with: title, content, components, school, tier (one of: Cantrip / Minor, Acolyte Tier, Master Class, God-Slayer / Forbidden), time, risk (one of: Stable, Volatile, Fatal). No markdown.";
                const result = await fetchOpenAI(prompt, "You are a master of arcane systems and spellcraft. Respond in raw JSON format only.");
                const parsed = JSON.parse(result.replace(/```json|```/g, "").trim());
                const id = 's-' + Date.now();
                state.spells.push({ id, ...parsed, image: null });
                state.activeSpellId = id;
                refreshUI(); debouncedSave();
                showToast("Arcane Pattern Manifested!", "success");
            } catch (err) { showToast("Manifesting failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Manifesting..."; }
        };

        window.processAI = async (type) => {
            const s = state.spells.find(x => x.id === state.activeSpellId);
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            try {
                const prompt = `Expand the arcane ${type} for this spell. Name: ${s.title}. School: ${s.school}. Tier: ${s.tier}. Current Data: ${s.content}. Format as an ancient, high-fidelity spellbook entry.`;
                const result = await fetchOpenAI(prompt, "You are a world-class narrative architect and magic system designer.");
                s.content += "\n\n" + result;
                refreshUI(); debouncedSave();
                showToast("Arcane wisdom expanded!", "success");
            } catch (err) { showToast("Link failure", "error"); }
            finally { overlay.classList.add('hidden'); }
        };

        window.generateVisual = async () => {
            const s = state.spells.find(x => x.id === state.activeSpellId);
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) return showToast("API Key required!", "error");
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Rendering Essence...";
            try {
                const prompt = `Hyper-detailed cinematic digital art of a magical spell effect: ${s.title}. Visual elements: ${s.content.slice(0,300)}. Glowing arcane sigils, magical particles, epic composition, professional lighting.`;
                const res = await fetch('/.netlify/functions/gateway-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: "dall-e-3", prompt, n: 1, response_format: "b64_json" })
                });
                const data = await res.json();
                s.image = `data:image/png;base64,${data.data[0].b64_json}`;
                refreshUI(); debouncedSave();
                showToast("Essence Rendered!", "success");
            } catch (err) { showToast("Render failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Manifesting..."; }
        };

        // --- Utils ---
        window.addSpell = () => {
            const id = 's-' + Date.now();
            state.spells.push({ id, title: "NEW_SPELL", content: "", components: "", school: "Unknown", tier: "Acolyte Tier", time: "Instant", risk: "Stable", image: null });
            state.activeSpellId = id; refreshUI(); debouncedSave();
        };
        window.selectSpell = (id) => { state.activeSpellId = id; refreshUI(); };
        window.deleteSpell = (id, e) => { e.stopPropagation(); if(state.spells.length <= 1) return; state.spells = state.spells.filter(x => x.id !== id); if(state.activeSpellId === id) state.activeSpellId = state.spells[0].id; refreshUI(); debouncedSave(); };
        window.removeImage = () => { const s = state.spells.find(x => x.id === state.activeSpellId); if(s) s.image = null; refreshUI(); debouncedSave(); };
        window.setViewMode = (mode) => { 
            state.viewMode = mode; 
            if(mode === 'preview') { document.getElementById('editor-container').classList.add('hidden'); document.getElementById('preview-container').classList.remove('hidden'); compilePreview(); } 
            else { document.getElementById('editor-container').classList.remove('hidden'); document.getElementById('preview-container').classList.add('hidden'); } renderNav(); 
        };

        function compilePreview() {
            const cont = document.getElementById('preview-content');
            let html = `
            <div class="print-header">
                <h1>${state.title}</h1>
                <p style="font-weight: 800; font-size: 10pt; color: #64748b; text-transform: uppercase; font-family:serif;">Official Tome of Power | kAIxu Grimoire Hub</p>
            </div>`;
            
            state.spells.forEach(s => {
                html += `
                <div class="spell-entry">
                    ${s.image ? `<div class="spell-visual"><img src="${s.image}"></div>` : ''}
                    <h2>INCANTATION: ${s.title}</h2>
                    <div style="margin-bottom: 20px;">
                        <span class="tag">SCHOOL: ${s.school}</span>
                        <span class="tag">TIER: ${s.tier}</span>
                        <span class="tag">RISK: ${s.risk}</span>
                    </div>
                    <p style="font-size: 10pt; margin-bottom: 5px;"><b>CAST TIME:</b> ${s.time}</p>
                    
                    <div class="prose prose-sm font-serif text-slate-700 leading-relaxed" style="clear: both; margin-top: 30px; border-top: 1px solid #6366f1; padding-top: 20px;">
                        <p style="font-weight: 900; text-transform: uppercase; font-size: 8pt; color: #4338ca; margin-bottom: 10px;">Arcane Manifestation:</p>
                        ${s.content.split('\n\n').map(p => `<p style="margin-bottom:10px;">${p}</p>`).join('')}
                    </div>

                    <div style="margin-top: 20px; background: #f8fafc; padding: 15px; border: 1px solid #e0e7ff; border-radius: 8px;">
                         <p style="font-weight: 900; text-transform: uppercase; font-size: 8pt; color: #4338ca; margin-bottom: 5px;">Somatic Requirements:</p>
                         <p style="font-family: monospace; font-size: 9pt;">${s.components}</p>
                    </div>
                </div>`;
            });
            cont.innerHTML = html;
        }

        window.toggleTutorial = (show) => document.getElementById('tutorial-modal').classList.toggle('hidden', !show);

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `flex items-center gap-3 px-8 py-4 rounded-2xl shadow-2xl font-black text-xs uppercase tracking-widest transition-all animate-bounce ${type === 'error' ? 'bg-red-600' : 'bg-indigo-600'} text-white z-[200]`;
            t.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { t.classList.add('opacity-0', 'translate-x-full'); setTimeout(() => t.remove(), 500); }, 3000);
        }

        window.onload = init;
    </script>
<script src="./suite-gateway-nav.js"></script>
</body>
</html>
