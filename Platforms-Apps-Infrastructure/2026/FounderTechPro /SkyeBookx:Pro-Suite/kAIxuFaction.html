<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kAIxu Faction - Political & Guild Architect</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.fb = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <style>
        /* PDF/PRINT ENGINE - FULLY WIRED STRATEGIC DOSSIER */
        @media print {
            @page { margin: 0.75in; size: letter landscape; }
            html, body { height: auto !important; overflow: visible !important; background: white !important; color: black !important; }
            #navbar, #editor-container, #bg-canvas, .no-print, #toast-container, #tutorial-modal { display: none !important; visibility: hidden !important; }
            #preview-container { display: block !important; position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; padding: 0 !important; background: white !important; }
            #preview-content { display: block !important; width: 100% !important; }
            
            .faction-dossier { page-break-inside: avoid !important; border: 4px solid #000; padding: 30px; margin-bottom: 50px; position: relative; }
            .print-header { border-bottom: 8px solid #000; padding-bottom: 10px; margin-bottom: 30px; }
            .print-header h1 { font-size: 32pt; font-weight: 900; text-transform: uppercase; margin: 0; }
            
            .sigil-box { width: 250px; height: 250px; border: 2px solid #000; float: left; margin-right: 30px; margin-bottom: 20px; }
            .sigil-box img { width: 100%; height: 100%; object-fit: cover; }
            
            h2 { font-size: 24pt; font-weight: 900; margin-top: 0; color: #000; text-transform: uppercase; border-bottom: 2px solid #000; display: inline-block; margin-bottom: 15px; }
            .meta-data { font-weight: 800; font-size: 10pt; text-transform: uppercase; color: #000; margin-bottom: 5px; }
            .page-break { page-break-after: always; }
        }
        
        @keyframes floatPulse {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.02); }
        }
        .animate-float-pulse { animation: floatPulse 4s ease-in-out infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #020617; pointer-events: none; }

        .glass-sidebar { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(12px); border-right: 1px solid rgba(0,0,0,0.1) !important; }
        .glass-nav { background: rgba(255, 255, 255, 0.98) !important; backdrop-filter: blur(16px); border-bottom: 2px solid #e2e8f0 !important; }
        .editor-card { background: white !important; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        
        .nexus-link { @apply text-[10px] text-slate-500 hover:text-indigo-600 flex items-center gap-1.5 transition-colors py-0.5 font-bold uppercase tracking-tighter; }
        #tutorial-modal { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); }
    </style>
</head>

            <!-- Baked-in Founder Graphic -->

    <!-- Wired Preview Dossier -->
    <div id="preview-container" class="hidden flex-1 overflow-y-auto bg-slate-950 p-12 print:p-0">
        <div id="preview-content" class="max-w-[11in] mx-auto bg-white p-12 shadow-2xl print:shadow-none min-h-screen"></div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[110] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module">
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kaixu-faction-architect-wired';
        
        let state = {
            title: "Network Zero",
            factions: [{ id: 'f-1', title: "THE NEURAL ASCENDANCY", content: "A high-tech syndicate operating from the dark web nodes...", base: "Deep London Underground", class: "Clandestine", alignment: "Strict Legal", power: "Global Hegemony", leader: "Director Thorne", image: null }],
            activeFactionId: 'f-1',
            viewMode: "editor",
            openaiKey: ""
        };
        let user = null, isSaving = false, saveTimeout = null;

        const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot } = window.fb;
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Three.js Power Grid Background ---
        function initThreeJS() {
            const canvas = document.getElementById('bg-canvas');
            if(!canvas) return;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            const l1 = new THREE.PointLight(0x06b6d4, 5, 100); l1.position.set(10, 10, 10); scene.add(l1);
            const l2 = new THREE.PointLight(0x6366f1, 5, 100); l2.position.set(-10, -10, 10); scene.add(l2);
            
            const nodeGeo = new THREE.IcosahedronGeometry(0.3, 0);
            const nodes = [];
            const group = new THREE.Group();
            for (let i = 0; i < 40; i++) {
                const mat = new THREE.MeshStandardMaterial({ color: 0x6366f1, emissive: 0x06b6d4, emissiveIntensity: 2, transparent: true, opacity: 0.6 });
                const mesh = new THREE.Mesh(nodeGeo, mat);
                mesh.position.set((Math.random()-0.5)*30, (Math.random()-0.5)*20, (Math.random()-0.5)*10);
                nodes.push(mesh);
                group.add(mesh);
            }
            scene.add(group);

            function animate() {
                requestAnimationFrame(animate);
                group.rotation.y += 0.001;
                nodes.forEach(n => { n.rotation.x += 0.01; n.rotation.y += 0.01; });
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        async function init() {
            initThreeJS();
            document.getElementById('proj-title-input').addEventListener('input', e => { state.title = e.target.value; debouncedSave(); });
            document.getElementById('openai-key').addEventListener('input', e => { state.openaiKey = e.target.value; debouncedSave(); });
            
            const inputs = ['faction-title', 'faction-content', 'faction-base', 'faction-class', 'faction-alignment', 'faction-power', 'faction-leader'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const field = id.split('-')[1];
                el.addEventListener('input', e => { 
                    const f = state.factions.find(x => x.id === state.activeFactionId);
                    if(f) { f[field] = e.target.value; if(field==='title') renderSidebar(); debouncedSave(); }
                });
                if(el.tagName === 'SELECT') el.addEventListener('change', e => {
                    const f = state.factions.find(x => x.id === state.activeFactionId);
                    if(f) { f[field] = e.target.value; debouncedSave(); }
                });
            });
            document.getElementById('import-input').addEventListener('change', handleImport);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (err) { console.error("Auth Error", err); }

            onAuthStateChanged(auth, u => { 
                user = u; 
                if(user) syncCloud();
            });
            renderNav();
        }

        async function syncCloud() {
            if(!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'factions', 'current');
            onSnapshot(docRef, snap => {
                if (snap.exists() && !isSaving) {
                    const data = snap.data();
                    if (data.factions && typeof data.factions === 'string') {
                        try { data.factions = JSON.parse(data.factions); } catch(e) {}
                    }
                    state = { ...state, ...data };
                    refreshUI();
                }
            });
        }

        function debouncedSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveToCloud, 2000); }

        async function saveToCloud() {
            if (!user) return;
            isSaving = true;
            const statusEl = document.getElementById('sync-status');
            statusEl.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-indigo-500"></i> <span>Syncing...</span>';
            try {
                const jsonFactions = JSON.stringify(state.factions);
                if (jsonFactions.length > 1000000) { statusEl.innerHTML = '<span class="text-amber-500">Local Only</span>'; return; }
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'factions', 'current');
                await setDoc(docRef, { ...state, factions: jsonFactions }, { merge: true });
                statusEl.innerHTML = '<i class="fa-solid fa-cloud text-indigo-400"></i> <span>Synced</span>';
            } catch (err) { statusEl.innerHTML = '<span>Error</span>'; }
            finally { setTimeout(() => isSaving = false, 500); }
        }

        window.exportToDevice = () => {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${state.title.replace(/\s+/g, '_')}.faction`;
            link.click();
            showToast("Backup Saved!", "success");
        };

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    state = { ...state, ...JSON.parse(e.target.result) };
                    refreshUI(); debouncedSave();
                    showToast("Faction Loaded!", "success");
                } catch (err) { showToast("Invalid file", "error"); }
            };
            reader.readAsText(file);
        }

        function refreshUI() {
            document.getElementById('proj-title-input').value = state.title;
            document.getElementById('openai-key').value = state.openaiKey || "";
            const f = state.factions.find(x => x.id === state.activeFactionId) || state.factions[0];
            if (!f) return;
            document.getElementById('faction-title').value = f.title;
            document.getElementById('faction-content').value = f.content;
            document.getElementById('faction-base').value = f.base;
            document.getElementById('faction-class').value = f.class;
            document.getElementById('faction-alignment').value = f.alignment;
            document.getElementById('faction-power').value = f.power;
            document.getElementById('faction-leader').value = f.leader;
            renderSidebar(); renderImageArea(f);
        }

        function renderSidebar() {
            const list = document.getElementById('faction-list');
            list.innerHTML = state.factions.map((f, idx) => `
                <div onclick="window.selectFaction('${f.id}')" class="group p-3.5 rounded-xl cursor-pointer transition-all border ${state.activeFactionId === f.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl' : 'bg-white border-slate-100 hover:border-indigo-300 text-slate-600'}">
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <span class="text-[9px] font-black w-5 h-5 rounded flex items-center justify-center shrink-0 ${state.activeFactionId === f.id ? 'bg-white text-indigo-600' : 'bg-slate-100 text-slate-400'}">${idx+1}</span>
                            <span class="truncate text-xs font-bold uppercase">${f.title || 'Untitled Faction'}</span>
                        </div>
                        <button onclick="window.deleteFaction('${f.id}', event)" class="opacity-0 group-hover:opacity-100 text-red-500"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderImageArea(faction) {
            const area = document.getElementById('faction-image-area');
            if (faction.image) {
                area.innerHTML = `<img src="${faction.image}" class="w-full h-full object-cover">
                <button onclick="window.removeImage()" class="absolute opacity-0 group-hover:opacity-100 bg-black/60 text-white p-2 rounded-lg text-[10px] backdrop-blur-md">Remove</button>`;
            } else {
                area.innerHTML = `<p class="text-slate-300 font-black uppercase text-[10px] tracking-widest text-center">kAIxu Sigil Queue</p>`;
            }
        }

        function renderNav() {
            const actions = document.getElementById('nav-actions');
            if (state.viewMode === 'editor') {
                actions.innerHTML = `<button onclick="window.setViewMode('preview')" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl transition-all">Compile Dossiers</button>`;
            } else {
                actions.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="window.setViewMode('editor')" class="bg-white border-2 border-slate-200 text-slate-700 py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest">Editor</button>
                        <button onclick="window.generatePDF()" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl">Export Dossier</button>
                    </div>`;
            }
        }

        window.generatePDF = () => { window.focus(); window.print(); };

        // --- OPENAI EXCLUSIVE WIRED LOGIC ---
        async function fetchOpenAI(prompt, system) {
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) throw new Error("Kaixu Key required.");
            const res = await fetch('/.netlify/functions/gateway-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ model: "gpt-4o", messages: [{ role: "system", content: system }, { role: "user", content: prompt }] })
            });
            if (!res.ok) throw new Error("API Connection Failure");
            const data = await res.json();
            return data.choices[0].message.content;
        }

        window.generateFromScratch = async () => {
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Founding Faction...";
            try {
                const prompt = "Generate a unique guild or political faction. Return a JSON object with: title, content, base, class (one of: Clandestine, Militarized, Corporate, Religious, Anarchist), alignment (one of: Strict Legal, Pragmatic, Illegal / Rebel, Terrorist / Chaos), power (one of: Minor Guild, Regional Hub, Continental Power, Global Hegemony), leader. No markdown.";
                const result = await fetchOpenAI(prompt, "You are a master of social architecture and geopolitics. JSON only.");
                const parsed = JSON.parse(result.replace(/```json|```/g, "").trim());
                const id = 'f-' + Date.now();
                state.factions.push({ id, ...parsed, image: null });
                state.activeFactionId = id;
                refreshUI(); debouncedSave();
                showToast("Faction Officially Founded!", "success");
            } catch (err) { showToast("Founding failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Founding..."; }
        };

        window.processAI = async (type) => {
            const f = state.factions.find(x => x.id === state.activeFactionId);
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            try {
                const prompt = `Expand the organizational ${type} for this faction. Name: ${f.title}. Class: ${f.class}. Current Intel: ${f.content}. Format as top-secret geopolitical intel.`;
                const result = await fetchOpenAI(prompt, "You are a master of strategic intelligence and guild management.");
                f.content += "\n\n" + result;
                refreshUI(); debouncedSave();
                showToast("Intel expanded!", "success");
            } catch (err) { showToast("Link failure", "error"); }
            finally { overlay.classList.add('hidden'); }
        };

        window.generateVisual = async () => {
            const f = state.factions.find(x => x.id === state.activeFactionId);
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) return showToast("API Key required!", "error");
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Rendering Sigil...";
            try {
                const prompt = `High-fidelity minimalist faction logo, sigil design, cinematic digital emblem, vector style, flat color, neon accents, organizational branding for: ${f.title}. Motif: ${f.class}. Atmosphere: ${f.alignment}.`;
                const res = await fetch('/.netlify/functions/gateway-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: "dall-e-3", prompt, n: 1, response_format: "b64_json" })
                });
                const data = await res.json();
                f.image = `data:image/png;base64,${data.data[0].b64_json}`;
                refreshUI(); debouncedSave();
                showToast("Sigil Rendered!", "success");
            } catch (err) { showToast("Render failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Founding..."; }
        };

        // --- Utils ---
        window.addFaction = () => {
            const id = 'f-' + Date.now();
            state.factions.push({ id, title: "NEW FACTION", content: "", base: "Unknown", class: "Clandestine", alignment: "Pragmatic", power: "Minor Guild", leader: "TBD", image: null });
            state.activeFactionId = id; refreshUI(); debouncedSave();
        };
        window.selectFaction = (id) => { state.activeFactionId = id; refreshUI(); };
        window.deleteFaction = (id, e) => { e.stopPropagation(); if(state.factions.length <= 1) return; state.factions = state.factions.filter(x => x.id !== id); if(state.activeFactionId === id) state.activeFactionId = state.factions[0].id; refreshUI(); debouncedSave(); };
        window.removeImage = () => { const f = state.factions.find(x => x.id === state.activeFactionId); if(f) f.image = null; refreshUI(); debouncedSave(); };
        window.setViewMode = (mode) => { 
            state.viewMode = mode; 
            if(mode === 'preview') { document.getElementById('editor-container').classList.add('hidden'); document.getElementById('preview-container').classList.remove('hidden'); compilePreview(); } 
            else { document.getElementById('editor-container').classList.remove('hidden'); document.getElementById('preview-container').classList.add('hidden'); } renderNav(); 
        };

        function compilePreview() {
            const cont = document.getElementById('preview-content');
            let html = `
            <div class="print-header">
                <h1>${state.title}</h1>
                <p style="font-weight: 800; font-size: 10pt; color: #64748b; text-transform: uppercase;">Official Strategic Intelligence Archive | kAIxu Faction Studio</p>
            </div>`;
            
            state.factions.forEach(f => {
                html += `
                <div class="faction-dossier">
                    ${f.image ? `<div class="sigil-box"><img src="${f.image}"></div>` : ''}
                    <h2>${f.title}</h2>
                    <div style="margin-bottom: 20px;">
                        <p class="meta-data"><b>LEADERSHIP:</b> ${f.leader}</p>
                        <p class="meta-data"><b>HQ BASE:</b> ${f.base}</p>
                        <p class="meta-data"><b>CLASS:</b> ${f.class} / ${f.power}</p>
                        <p class="meta-data"><b>ALIGNMENT:</b> ${f.alignment}</p>
                    </div>
                    <div class="prose prose-sm font-serif text-slate-700 leading-relaxed" style="clear: both; margin-top: 30px; border-top: 1px solid #000; pt-20">
                        <p style="font-weight: 900; text-transform: uppercase; font-size: 8pt; color: #000; margin-bottom: 10px; margin-top: 20px;">Strategic Intel Report:</p>
                        ${f.content.split('\n\n').map(p => `<p>${p}</p>`).join('')}
                    </div>
                </div>`;
            });
            cont.innerHTML = html;
        }

        window.toggleTutorial = (show) => document.getElementById('tutorial-modal').classList.toggle('hidden', !show);

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `flex items-center gap-3 px-8 py-4 rounded-2xl shadow-2xl font-black text-xs uppercase tracking-widest transition-all animate-bounce ${type === 'error' ? 'bg-red-600' : 'bg-indigo-600'} text-white z-[200]`;
            t.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { t.classList.add('opacity-0', 'translate-x-full'); setTimeout(() => t.remove(), 500); }, 3000);
        }

        window.onload = init;
    </script>
<script src="./suite-gateway-nav.js"></script>
</body>
</html>
