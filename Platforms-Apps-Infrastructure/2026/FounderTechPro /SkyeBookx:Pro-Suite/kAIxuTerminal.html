<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kAIxu Terminal - Network & Cryptography Architect</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.fb = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <style>
        /* PDF/PRINT ENGINE - SYSTEM AUDIT REPORT */
        @media print {
            @page { margin: 0.75in; size: letter; }
            html, body { height: auto !important; overflow: visible !important; background: white !important; color: black !important; }
            #navbar, #editor-container, #bg-canvas, .no-print, #toast-container, #tutorial-modal { display: none !important; visibility: hidden !important; }
            #preview-container { display: block !important; position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; padding: 0 !important; background: white !important; }
            #preview-content { display: block !important; width: 100% !important; }
            
            .audit-report { page-break-inside: avoid !important; border: 2px solid #000; padding: 40px; margin-bottom: 50px; position: relative; font-family: monospace !important; }
            .print-header { border-bottom: 5px solid #000; padding-bottom: 15px; margin-bottom: 30px; }
            .print-header h1 { font-size: 32pt; font-weight: 900; text-transform: uppercase; margin: 0; }
            
            .node-visual { width: 300px; border: 2px solid #000; float: right; margin-left: 20px; }
            .node-visual img { width: 100%; height: auto; }
            
            h2 { font-size: 22pt; font-weight: 900; margin-top: 0; color: #000; text-transform: uppercase; }
            .security-pill { border: 1px solid #000; padding: 5px 15px; font-weight: 800; display: inline-block; margin-right: 10px; -webkit-print-color-adjust: exact; background: #eee !important; }
            .page-break { page-break-after: always; }
        }
        
        @keyframes pulseData {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .animate-data-pulse { animation: pulseData 3s ease-in-out infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #020617; pointer-events: none; }

        .glass-sidebar { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(12px); border-right: 1px solid rgba(0,0,0,0.1) !important; }
        .glass-nav { background: rgba(255, 255, 255, 0.98) !important; backdrop-filter: blur(16px); border-bottom: 2px solid #e2e8f0 !important; }
        .editor-card { background: white !important; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        
        .nexus-link { @apply text-[10px] text-slate-500 hover:text-indigo-600 flex items-center gap-1.5 transition-colors py-0.5 font-bold uppercase tracking-tighter; }
        #tutorial-modal { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); }
    </style>
</head>

            <!-- Baked-in Founder Graphic -->

                <img src="https://cdn1.sharemyimage.com/2026/03/03/Gemini_Generated_Image_5aft6s5aft6s5aft-1.png" alt="Founder" class="w-64 h-auto object-contain animate-data-pulse opacity-100 drop-shadow-2xl">

    <!-- Wired Preview & PDF Dossier -->
    <div id="preview-container" class="hidden flex-1 overflow-y-auto bg-slate-950 p-12 print:p-0">

    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[110] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module">
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kaixu-terminal-suite-wired';
        
        let state = {
            title: "Network Audit 01",
            nodes: [{ id: 'n-1', title: "KAIXU_CORE", content: "System Integrity: 100%. All firewalls active. Neural link standby...", encryption: "Viper-Alpha-9", type: "Mainframe", security: "Black-Site", ip: "10.0.0.1", port: "2201", image: null }],
            activeNodeId: 'n-1',
            viewMode: "editor",
            openaiKey: ""
        };
        let user = null, isSaving = false, saveTimeout = null;

        const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot } = window.fb;
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Three.js Data Stream Background ---
        function initThreeJS() {
            const canvas = document.getElementById('bg-canvas');
            if(!canvas) return;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            const l1 = new THREE.PointLight(0x6366f1, 5, 100); l1.position.set(10, 10, 10); scene.add(l1);
            const l2 = new THREE.PointLight(0x06b6d4, 5, 100); l2.position.set(-10, -10, 10); scene.add(l2);
            
            const points = [];
            const geo = new THREE.BoxGeometry(0.1, 0.5, 0.1);
            for (let i = 0; i < 150; i++) {
                const mat = new THREE.MeshStandardMaterial({ color: 0x6366f1, emissive: 0x6366f1, emissiveIntensity: 2, transparent: true, opacity: 0.6 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*30, (Math.random()-0.5)*20);
                points.push({ mesh, speed: 0.05 + Math.random() * 0.2 });
                scene.add(mesh);
            }

            function animate() {
                requestAnimationFrame(animate);
                points.forEach(p => {
                    p.mesh.position.y -= p.speed;
                    if(p.mesh.position.y < -15) p.mesh.position.y = 15;
                });
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        async function init() {
            initThreeJS();
            document.getElementById('proj-title-input').addEventListener('input', e => { state.title = e.target.value; debouncedSave(); });
            document.getElementById('openai-key').addEventListener('input', e => { state.openaiKey = e.target.value; debouncedSave(); });
            
            const inputs = ['node-title', 'node-content', 'node-encryption', 'node-type', 'node-security', 'node-ip', 'node-port'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const field = id.split('-')[1];
                el.addEventListener('input', e => { 
                    const n = state.nodes.find(x => x.id === state.activeNodeId);
                    if(n) { n[field] = e.target.value; if(field==='title') renderSidebar(); debouncedSave(); }
                });
                if(el.tagName === 'SELECT') el.addEventListener('change', e => {
                    const n = state.nodes.find(x => x.id === state.activeNodeId);
                    if(n) { n[field] = e.target.value; debouncedSave(); }
                });
            });
            document.getElementById('import-input').addEventListener('change', handleImport);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (err) { console.error("Auth Error", err); }

            onAuthStateChanged(auth, u => { 
                user = u; 
                if(user) syncCloud();
            });
            renderNav();
        }

        async function syncCloud() {
            if(!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'terminal', 'current');
            onSnapshot(docRef, snap => {
                if (snap.exists() && !isSaving) {
                    const data = snap.data();
                    if (data.nodes && typeof data.nodes === 'string') {
                        try { data.nodes = JSON.parse(data.nodes); } catch(e) {}
                    }
                    state = { ...state, ...data };
                    refreshUI();
                }
            });
        }

        function debouncedSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveToCloud, 2000); }

        async function saveToCloud() {
            if (!user) return;
            isSaving = true;
            const statusEl = document.getElementById('sync-status');
            statusEl.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-indigo-500"></i> <span>Syncing...</span>';
            try {
                const jsonNodes = JSON.stringify(state.nodes);
                if (jsonNodes.length > 1000000) { statusEl.innerHTML = '<span class="text-amber-500">Local Only</span>'; return; }
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'terminal', 'current');
                await setDoc(docRef, { ...state, nodes: jsonNodes }, { merge: true });
                statusEl.innerHTML = '<i class="fa-solid fa-link text-indigo-400"></i> <span>Synced</span>';
            } catch (err) { statusEl.innerHTML = '<span>Error</span>'; }
            finally { setTimeout(() => isSaving = false, 500); }
        }

        window.exportToDevice = () => {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${state.title.replace(/\s+/g, '_')}.terminal`;
            link.click();
            showToast("Project Data Saved!", "success");
        };

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    state = { ...state, ...JSON.parse(e.target.result) };
                    refreshUI(); debouncedSave();
                    showToast("Vault Loaded Successfully!", "success");
                } catch (err) { showToast("Invalid terminal file", "error"); }
            };
            reader.readAsText(file);
        }

        function refreshUI() {
            document.getElementById('proj-title-input').value = state.title;
            document.getElementById('openai-key').value = state.openaiKey || "";
            const n = state.nodes.find(x => x.id === state.activeNodeId) || state.nodes[0];
            if (!n) return;
            document.getElementById('node-title').value = n.title;
            document.getElementById('node-content').value = n.content;
            document.getElementById('node-encryption').value = n.encryption;
            document.getElementById('node-type').value = n.type;
            document.getElementById('node-security').value = n.security;
            document.getElementById('node-ip').value = n.ip;
            document.getElementById('node-port').value = n.port;
            renderSidebar(); renderImageArea(n);
        }

        function renderSidebar() {
            const list = document.getElementById('node-list');
            list.innerHTML = state.nodes.map((n, idx) => `
                <div onclick="window.selectNode('${n.id}')" class="group p-3.5 rounded-xl cursor-pointer transition-all border ${state.activeNodeId === n.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl' : 'bg-white border-slate-100 hover:border-indigo-300 text-slate-600'}">
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <span class="text-[9px] font-black w-5 h-5 rounded flex items-center justify-center shrink-0 ${state.activeNodeId === n.id ? 'bg-white text-indigo-600' : 'bg-slate-100 text-slate-400'}">${idx+1}</span>
                            <span class="truncate text-xs font-bold uppercase block">${n.title || 'Untitled Node'}</span>
                        </div>
                        <button onclick="window.deleteNode('${n.id}', event)" class="opacity-0 group-hover:opacity-100 text-red-500"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderImageArea(node) {
            const area = document.getElementById('node-image-area');
            if (node.image) {
                area.innerHTML = `<img src="${node.image}" class="w-full h-full object-cover">
                <button onclick="window.removeImage()" class="absolute opacity-0 group-hover:opacity-100 bg-black/60 text-white p-2 rounded-lg text-[10px] backdrop-blur-md">Remove</button>`;
            } else {
                area.innerHTML = `<p class="text-slate-300 font-black uppercase text-[10px] tracking-widest text-center">kAIxu Interface Queue</p>`;
            }
        }

        function renderNav() {
            const actions = document.getElementById('nav-actions');
            if (state.viewMode === 'editor') {
                actions.innerHTML = `<button onclick="window.setViewMode('preview')" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl transition-all">Compile Audit</button>`;
            } else {
                actions.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="window.setViewMode('editor')" class="bg-white border-2 border-slate-200 text-slate-700 py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest">Editor</button>
                        <button onclick="window.generatePDF()" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl">Export PDF</button>
                    </div>`;
            }
        }

        window.generatePDF = () => { window.focus(); window.print(); };

        // --- OPENAI EXCLUSIVE WIRED LOGIC ---
        async function fetchOpenAI(prompt, system) {
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) throw new Error("Kaixu Key required.");
            const res = await fetch('/.netlify/functions/gateway-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ model: "gpt-4o", messages: [{ role: "system", content: system }, { role: "user", content: prompt }] })
            });
            if (!res.ok) throw new Error("API Link Failure");
            const data = await res.json();
            return data.choices[0].message.content;
        }

        window.generateFromScratch = async () => {
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Infiltrating Node...";
            try {
                const prompt = "Generate a unique digital node or hacking target for a world. Return a JSON object with: title (hostname), content (decrypted logs), encryption (type), type (one of: Mainframe, Edge Server, Encrypted Vault, Neural Link, Satellite Hub), security (one of: Public, Standard, Classified, Black-Site), ip, port. No markdown.";
                const result = await fetchOpenAI(prompt, "You are a master digital architect and network infiltrator. Respond in raw JSON format only.");
                const parsed = JSON.parse(result.replace(/```json|```/g, "").trim());
                const id = 'n-' + Date.now();
                state.nodes.push({ id, ...parsed, image: null });
                state.activeNodeId = id;
                refreshUI(); debouncedSave();
                showToast("Node Successfully Decrypted!", "success");
            } catch (err) { showToast("Evolution failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Accessing..."; }
        };

        window.processAI = async (type) => {
            const n = state.nodes.find(x => x.id === state.activeNodeId);
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            try {
                const prompt = `Expand the digital ${type} for this node. Hostname: ${n.title}. Type: ${n.type}. Current Data: ${n.content}. Format as encrypted system records or clandestine hacking logs.`;
                const result = await fetchOpenAI(prompt, "You are a master systems architect and cryptographer.");
                n.content += "\n\n" + result;
                refreshUI(); debouncedSave();
                showToast("System logic expanded!", "success");
            } catch (err) { showToast("Link failure", "error"); }
            finally { overlay.classList.add('hidden'); }
        };

        window.generateVisual = async () => {
            const n = state.nodes.find(x => x.id === state.activeNodeId);
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) return showToast("API Key required!", "error");
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Rendering UI...";
            try {
                const prompt = `Cyberpunk hacking interface, futuristic terminal HUD, glowing neon text, complex network graph, high-fidelity digital art, UI design for node: ${n.title}. Type: ${n.type}. Security Level: ${n.security}.`;
                const res = await fetch('/.netlify/functions/gateway-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: "dall-e-3", prompt, n: 1, response_format: "b64_json" })
                });
                const data = await res.json();
                n.image = `data:image/png;base64,${data.data[0].b64_json}`;
                refreshUI(); debouncedSave();
                showToast("Interface Rendered!", "success");
            } catch (err) { showToast("Render failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Accessing..."; }
        };

        // --- Utils ---
        window.addNode = () => {
            const id = 'n-' + Date.now();
            state.nodes.push({ id, title: "NEW_NODE", content: "", encryption: "None", type: "Edge Server", security: "Standard", ip: "0.0.0.0", port: "80", image: null });
            state.activeNodeId = id; refreshUI(); debouncedSave();
        };
        window.selectNode = (id) => { state.activeNodeId = id; refreshUI(); };
        window.deleteNode = (id, e) => { e.stopPropagation(); if(state.nodes.length <= 1) return; state.nodes = state.nodes.filter(x => x.id !== id); if(state.activeNodeId === id) state.activeNodeId = state.nodes[0].id; refreshUI(); debouncedSave(); };
        window.removeImage = () => { const n = state.nodes.find(x => x.id === state.activeNodeId); if(n) n.image = null; refreshUI(); debouncedSave(); };
        window.setViewMode = (mode) => { 
            state.viewMode = mode; 
            if(mode === 'preview') { document.getElementById('editor-container').classList.add('hidden'); document.getElementById('preview-container').classList.remove('hidden'); compilePreview(); } 
            else { document.getElementById('editor-container').classList.remove('hidden'); document.getElementById('preview-container').classList.add('hidden'); } renderNav(); 
        };

        function compilePreview() {
            const cont = document.getElementById('preview-content');
            let html = `
            <div class="print-header">
                <h1>${state.title}</h1>
                <p style="font-weight: 800; font-size: 10pt; color: #64748b; text-transform: uppercase; font-family:monospace;">Official Network Audit Log | kAIxu Terminal Studio</p>
            </div>`;
            
            state.nodes.forEach(n => {
                html += `
                <div class="audit-report">
                    ${n.image ? `<div class="node-visual"><img src="${n.image}"></div>` : ''}
                    <h2>HOST: ${n.title}</h2>
                    <div style="margin-bottom: 20px;">
                        <span class="security-pill">TYPE: ${n.type}</span>
                        <span class="security-pill">SECURITY: ${n.security}</span>
                    </div>
                    <p style="font-size: 10pt; font-family: monospace; margin-bottom: 5px;"><b>IP ADDRESS:</b> ${n.ip}</p>
                    <p style="font-size: 10pt; font-family: monospace; margin-bottom: 5px;"><b>ACTIVE PORT:</b> ${n.port}</p>
                    <p style="font-size: 10pt; font-family: monospace; margin-bottom: 20px;"><b>ENCRYPTION:</b> ${n.encryption}</p>
                    
                    <div class="prose prose-sm font-mono text-slate-700 leading-relaxed" style="clear: both; margin-top: 30px; border-top: 1px solid #000; padding-top: 20px;">
                        <p style="font-weight: 900; text-transform: uppercase; font-size: 8pt; color: #000; margin-bottom: 10px;">Decrypted Payload:</p>
                        ${n.content.split('\n\n').map(p => `<p style="margin-bottom:10px;">${p}</p>`).join('')}
                    </div>
                </div>`;
            });
            cont.innerHTML = html;
        }

        window.toggleTutorial = (show) => document.getElementById('tutorial-modal').classList.toggle('hidden', !show);

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `flex items-center gap-3 px-8 py-4 rounded-2xl shadow-2xl font-black text-xs uppercase tracking-widest transition-all animate-bounce ${type === 'error' ? 'bg-red-600' : 'bg-indigo-600'} text-white z-[200]`;
            t.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { t.classList.add('opacity-0', 'translate-x-full'); setTimeout(() => t.remove(), 500); }, 3000);
        }

        window.onload = init;
    </script>
<script src="./suite-gateway-nav.js"></script>
</body>
</html>
