<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kAIxu Lexicon - Language & Script Architect</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.fb = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <style>
        /* PDF/PRINT ENGINE - LINGUISTIC FIELD GUIDE */
        @media print {
            @page { margin: 0.75in; size: letter; }
            html, body { height: auto !important; overflow: visible !important; background: white !important; color: black !important; font-family: serif !important; }
            #navbar, #editor-container, #bg-canvas, .no-print, #toast-container, #tutorial-modal { display: none !important; visibility: hidden !important; }
            #preview-container { display: block !important; position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; padding: 0 !important; background: white !important; }
            #preview-content { display: block !important; width: 100% !important; }
            
            .language-entry { page-break-inside: avoid !important; border-bottom: 2px solid #000; padding-bottom: 50px; margin-bottom: 50px; position: relative; }
            .print-header { border-bottom: 5px solid #000; padding-bottom: 15px; margin-bottom: 30px; text-align: center; }
            .print-header h1 { font-size: 32pt; font-weight: 900; text-transform: uppercase; margin: 0; }
            
            .script-visual { width: 350px; border: 2px solid #000; float: right; margin-left: 25px; margin-bottom: 15px; }
            .script-visual img { width: 100%; height: auto; display: block; }
            
            h2 { font-size: 26pt; font-weight: 900; margin-top: 0; color: #000; text-transform: uppercase; }
            .grammar-block { background: #f1f5f9 !important; padding: 20px; border: 1px solid #cbd5e1; margin-top: 20px; -webkit-print-color-adjust: exact; }
            .page-break { page-break-after: always; }
        }
        
        @keyframes floatPulse {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { transform: translateY(-8px) scale(1.02); opacity: 1; }
        }
        .animate-glyph { animation: floatPulse 6s ease-in-out infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 10px; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #020617; pointer-events: none; }

        .glass-sidebar { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(12px); border-right: 1px solid rgba(0,0,0,0.1) !important; }
        .glass-nav { background: rgba(255, 255, 255, 0.98) !important; backdrop-filter: blur(16px); border-bottom: 2px solid #e2e8f0 !important; }
        .editor-card { background: white !important; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        
        .nexus-link { @apply text-[10px] text-slate-500 hover:text-indigo-600 flex items-center gap-1.5 transition-colors py-0.5 font-bold uppercase tracking-tighter; }
        #tutorial-modal { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden font-sans">

    <div class="fixed inset-0 pointer-events-none border-[6px] border-yellow-400 shadow-[inset_0_0_30px_rgba(250,204,21,0.3)] z-[100] no-print"></div>

        <div class="flex items-center gap-3">
            <img src="https://cdn1.sharemyimage.com/2026/02/16/logo1_transparent.png" alt="Logo" class="h-10 w-auto animate-glyph">
            <h1 class="text-xl font-bold text-slate-900 tracking-tight uppercase">kAIxu Lexicon</h1>
        </div>

        <div class="flex-1 max-w-xl mx-8 flex items-center gap-3">
            <input type="text" id="proj-title-input" class="flex-1 text-center font-bold text-slate-800 bg-slate-100 border-none rounded-lg py-2 px-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Language Archive Name">
            
            <div class="flex items-center gap-2 no-print">

    <!-- Editor Layout -->
    <div id="editor-container" class="flex flex-1 overflow-hidden">

            <div class="p-4 border-b border-slate-100 relative z-10 flex flex-col gap-2 bg-white/50">

                    <i class="fa-solid fa-pen-nib"></i> New Language
                </button>
                <button onclick="generateFromScratch()" class="w-full flex items-center justify-center gap-2 bg-slate-900 hover:bg-black text-white py-2 px-4 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-md transition-all active:scale-95">
                    <i class="fa-solid fa-wand-sparkles text-indigo-400"></i> Con-Lang From Scratch
                </button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="exportToDevice()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 p-2 rounded-lg font-bold text-[10px] border border-slate-200 transition-all">
                        <i class="fa-solid fa-download"></i> Save Project
                    </button>
                    <label class="bg-slate-100 hover:bg-slate-200 text-slate-600 p-2 rounded-lg font-bold text-[10px] border border-slate-200 cursor-pointer text-center transition-all">

            </div>
            
            <div id="language-list" class="flex-1 overflow-y-auto p-4 space-y-2 relative z-10"></div>
            
            <!-- Nexus Network -->
            <div class="p-4 bg-slate-50/50 border-t border-slate-100 relative z-10 space-y-4">
                <div>
                    <h4 class="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-2">Sovereign Satellites</h4>
                    <div class="grid grid-cols-1 gap-0.5 max-h-24 overflow-y-auto pr-2">
                        <a href="https://skyesol.netlify.app/" target="_blank" class="nexus-link">SkyesSOL</a>
                        <a href="https://skyeletix.netlify.app" target="_blank" class="nexus-link">Skyeletix</a>
                        <a href="https://northstarofficexaccounting.netlify.app" target="_blank" class="nexus-link">NorthStar Office</a>
                        <a href="https://sole-nexus.netlify.app" target="_blank" class="nexus-link">SOLE Nexus</a>
                    </div>
                </div>
                <div class="pt-2 border-t border-slate-200 text-[9px] font-bold text-slate-400">
                    <p>(480) 469-5416</p>
                    <p class="truncate uppercase tracking-tighter">SkyesOverLondonLC@SOLEnterprises.org</p>
                </div>
            </div>
            
            <!-- Baked-in Founder Graphic -->
            <div class="absolute bottom-0 left-0 w-full z-0 flex flex-col items-center pointer-events-none no-print pb-4">
                <div class="mb-2 px-3 py-1 border-2 border-indigo-400 rounded-lg bg-white/90 backdrop-blur-md text-[9px] font-black text-indigo-900 tracking-widest uppercase shadow-xl">
                    Skyes' The Limit
                </div>
                <img src="https://cdn1.sharemyimage.com/2026/03/03/Gemini_Generated_Image_5aft6s5aft6s5aft-1.png" alt="Founder" class="w-64 h-auto object-contain animate-glyph opacity-100 drop-shadow-2xl">
            </div>
        </div>

        <div class="flex-1 flex flex-col relative bg-transparent overflow-y-auto" id="main-workspace">
            <div class="max-w-5xl mx-auto w-full p-8 lg:p-12 space-y-8 relative z-10">
                
                <input type="text" id="lang-title" class="w-full text-5xl font-black text-white bg-transparent border-none outline-none placeholder-white/20 focus:ring-0 drop-shadow-lg" placeholder="Language Name">

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Linguistic Data -->
                    <div class="editor-card rounded-3xl overflow-hidden flex flex-col lg:col-span-2 relative">
                        <div class="p-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
                            <span class="font-bold text-slate-800 text-xs uppercase tracking-tight">Etymology & Grammar</span>
                            <div class="flex gap-2">
                                <button onclick="processAI('grammar')" class="text-[10px] bg-white border px-3 py-1 rounded-lg font-bold hover:bg-slate-50 transition-colors uppercase">Ruleset</button>
                                <button onclick="processAI('slang')" class="text-[10px] bg-slate-900 text-white px-3 py-1 rounded-lg font-bold hover:bg-black transition-colors uppercase">Cultural Slang</button>
                            </div>
                        </div>
                        
                        <div id="parsing-overlay" class="hidden absolute inset-0 bg-white/90 backdrop-blur-md z-10 flex flex-col items-center justify-center text-indigo-600">
                             <i class="fa-solid fa-language text-5xl mb-4 animate-pulse"></i>
                             <p class="font-black text-xl uppercase tracking-widest" id="parsing-text">kAIxu Constructing...</p>
                        </div>

                        <textarea id="lang-content" class="w-full h-full min-h-[400px] p-10 text-sm leading-relaxed border-none outline-none resize-none font-serif text-slate-700 bg-white" placeholder="Describe the language's sound, history, and basic vocabulary..."></textarea>
                    </div>

                    <!-- Script Visualization -->
                    <div class="editor-card rounded-3xl overflow-hidden flex flex-col lg:col-span-1">
                        <div class="p-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
                            <span class="font-bold text-slate-800 text-xs uppercase tracking-widest">Writing System</span>
                            <button onclick="generateVisual()" class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-[10px] font-black hover:bg-indigo-700 transition-all active:scale-95 uppercase">
                                Render Script
                            </button>
                        </div>
                        <div id="lang-image-area" class="bg-slate-100 aspect-square flex items-center justify-center relative group overflow-hidden">
                            <p class="text-slate-300 font-bold uppercase text-[10px]">No Script Rendered</p>
                        </div>
                        <div class="p-6 bg-white space-y-4">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Core Vocabulary</label>
                                <textarea id="lang-vocab" class="w-full bg-slate-50 border-none rounded-lg p-3 text-xs outline-none mt-1 h-24 resize-none font-mono" placeholder="Hello -> [Word], Sky -> [Word]..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Linguistic Metadata -->
                <div class="editor-card rounded-2xl p-8 space-y-6">
                    <h3 class="text-xs font-black uppercase text-slate-400 tracking-tighter">Phonetic Parameters</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Linguistic Family</label>
                            <input type="text" id="lang-family" class="w-full bg-slate-50 border-none rounded-lg p-3 text-sm outline-none mt-1 font-bold text-slate-700" placeholder="e.g. Sinitic, Germanic">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Complexity</label>
                            <select id="lang-complexity" class="w-full bg-slate-50 border-none rounded-lg p-3 text-sm outline-none mt-1 font-bold text-slate-700 shadow-inner">
                                <option>Simple / Pidgin</option>
                                <option>Standard</option>
                                <option>High / Academic</option>
                                <option>Ancient / Arcane</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Phonetics</label>
                            <input type="text" id="lang-phonetics" class="w-full bg-slate-50 border-none rounded-lg p-3 text-sm outline-none mt-1 font-bold text-slate-700" placeholder="Guttural, Silken...">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Script Type</label>
                            <select id="lang-script" class="w-full bg-slate-50 border-none rounded-lg p-3 text-sm outline-none mt-1 font-bold text-slate-700">
                                <option>Alphabetic</option>
                                <option>Logographic</option>
                                <option>Syllabic</option>
                                <option>Abjad</option>
                                <option>Cuneiform</option>

                        </div>
                    </div>
                </div>

            </div>
        </div>

    <!-- Wired Preview & PDF Dossier -->
    <div id="preview-container" class="hidden flex-1 overflow-y-auto bg-slate-950 p-12 print:p-0">
        <div id="preview-content" class="max-w-[8.5in] mx-auto bg-white p-12 shadow-2xl print:shadow-none min-h-screen"></div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[110] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module">
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kaixu-lexicon-architect-wired';
        
        let state = {
            title: "Linguistic Lexicon 01",
            languages: [{ id: 'l-1', title: "KAIXUANISH", content: "A silken, flowing language spoken by the high architects...", vocab: "Hello -> Kai\nSky -> Xu\nPower -> Prime", family: "Neural-Linguistics", complexity: "High / Academic", phonetics: "Silken / Melodic", script: "Logographic", image: null }],
            activeLangId: 'l-1',
            viewMode: "editor",
            openaiKey: ""
        };
        let user = null, isSaving = false, saveTimeout = null;

        const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot } = window.fb;
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Three.js Glyph Nebula Background ---
        function initThreeJS() {
            const canvas = document.getElementById('bg-canvas');
            if(!canvas) return;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            const l1 = new THREE.PointLight(0x6366f1, 5, 100); l1.position.set(10, 10, 10); scene.add(l1);
            const l2 = new THREE.PointLight(0x06b6d4, 5, 100); l2.position.set(-10, -10, 10); scene.add(l2);
            
            const group = new THREE.Group();
            const charGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            for (let i = 0; i < 80; i++) {
                const mat = new THREE.MeshStandardMaterial({ color: 0x6366f1, emissive: 0x06b6d4, emissiveIntensity: 2, transparent: true, opacity: 0.5 });
                const mesh = new THREE.Mesh(charGeo, mat);
                mesh.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*30, (Math.random()-0.5)*15);
                mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                group.add(mesh);
            }
            scene.add(group);

            function animate() {
                requestAnimationFrame(animate);
                group.rotation.y += 0.0008;
                group.rotation.x += 0.0004;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        async function init() {
            initThreeJS();
            document.getElementById('proj-title-input').addEventListener('input', e => { state.title = e.target.value; debouncedSave(); });
            document.getElementById('openai-key').addEventListener('input', e => { state.openaiKey = e.target.value; debouncedSave(); });
            
            const inputs = ['lang-title', 'lang-content', 'lang-vocab', 'lang-family', 'lang-complexity', 'lang-phonetics', 'lang-script'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const field = id.split('-')[1];
                el.addEventListener('input', e => { 
                    const l = state.languages.find(x => x.id === state.activeLangId);
                    if(l) { l[field] = e.target.value; if(field==='title') renderSidebar(); debouncedSave(); }
                });
                if(el.tagName === 'SELECT') el.addEventListener('change', e => {
                    const l = state.languages.find(x => x.id === state.activeLangId);
                    if(l) { l[field] = e.target.value; debouncedSave(); }
                });
            });
            document.getElementById('import-input').addEventListener('change', handleImport);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (err) { console.error("Auth Error", err); }

            onAuthStateChanged(auth, u => { 
                user = u; 
                if(user) syncCloud();
            });
            renderNav();
        }

        async function syncCloud() {
            if(!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'lexicon', 'current');
            onSnapshot(docRef, snap => {
                if (snap.exists() && !isSaving) {
                    const data = snap.data();
                    if (data.languages && typeof data.languages === 'string') {
                        try { data.languages = JSON.parse(data.languages); } catch(e) {}
                    }
                    state = { ...state, ...data };
                    refreshUI();
                }
            });
        }

        function debouncedSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveToCloud, 2000); }

        async function saveToCloud() {
            if (!user) return;
            isSaving = true;
            const statusEl = document.getElementById('sync-status');
            statusEl.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-indigo-500"></i> <span>Syncing...</span>';
            try {
                const jsonLangs = JSON.stringify(state.languages);
                if (jsonLangs.length > 1000000) { statusEl.innerHTML = '<span class="text-amber-500">Local Only</span>'; return; }
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'lexicon', 'current');
                await setDoc(docRef, { ...state, languages: jsonLangs }, { merge: true });
                statusEl.innerHTML = '<i class="fa-solid fa-link text-indigo-400"></i> <span>Synced</span>';
            } catch (err) { statusEl.innerHTML = '<span>Error</span>'; }
            finally { setTimeout(() => isSaving = false, 500); }
        }

        window.exportToDevice = () => {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${state.title.replace(/\s+/g, '_')}.lexicon`;
            link.click();
            showToast("Archive Saved!", "success");
        };

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    state = { ...state, ...JSON.parse(e.target.result) };
                    refreshUI(); debouncedSave();
                    showToast("Lexicon Loaded!", "success");
                } catch (err) { showToast("Invalid terminal file", "error"); }
            };
            reader.readAsText(file);
        }

        function refreshUI() {
            document.getElementById('proj-title-input').value = state.title;
            document.getElementById('openai-key').value = state.openaiKey || "";
            const l = state.languages.find(x => x.id === state.activeLangId) || state.languages[0];
            if (!l) return;
            document.getElementById('lang-title').value = l.title;
            document.getElementById('lang-content').value = l.content;
            document.getElementById('lang-vocab').value = l.vocab;
            document.getElementById('lang-family').value = l.family;
            document.getElementById('lang-complexity').value = l.complexity;
            document.getElementById('lang-phonetics').value = l.phonetics;
            document.getElementById('lang-script').value = l.script;
            renderSidebar(); renderImageArea(l);
        }

        function renderSidebar() {
            const list = document.getElementById('language-list');
            list.innerHTML = state.languages.map((l, idx) => `
                <div onclick="window.selectLanguage('${l.id}')" class="group p-3.5 rounded-xl cursor-pointer transition-all border ${state.activeLangId === l.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl' : 'bg-white border-slate-100 hover:border-indigo-300 text-slate-600'}">
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <span class="text-[9px] font-black w-5 h-5 rounded flex items-center justify-center shrink-0 ${state.activeLangId === l.id ? 'bg-white text-indigo-600' : 'bg-slate-100 text-slate-400'}">${idx+1}</span>
                            <span class="truncate text-xs font-bold uppercase block">${l.title || 'Untitled Lang'}</span>
                        </div>
                        <button onclick="window.deleteLanguage('${l.id}', event)" class="opacity-0 group-hover:opacity-100 text-red-500"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderImageArea(lang) {
            const area = document.getElementById('lang-image-area');
            if (lang.image) {
                area.innerHTML = `<img src="${lang.image}" class="w-full h-full object-cover">
                <button onclick="window.removeImage()" class="absolute opacity-0 group-hover:opacity-100 bg-black/60 text-white p-2 rounded-lg text-[10px] backdrop-blur-md">Remove</button>`;
            } else {
                area.innerHTML = `<p class="text-slate-300 font-black uppercase text-[10px] tracking-widest text-center">kAIxu Script Queue</p>`;
            }
        }

        function renderNav() {
            const actions = document.getElementById('nav-actions');
            if (state.viewMode === 'editor') {
                actions.innerHTML = `<button onclick="window.setViewMode('preview')" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl transition-all">Compile Manual</button>`;
            } else {
                actions.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="window.setViewMode('editor')" class="bg-white border-2 border-slate-200 text-slate-700 py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest">Editor</button>
                        <button onclick="window.generatePDF()" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl">Export PDF</button>
                    </div>`;
            }
        }

        window.generatePDF = () => { window.focus(); window.print(); };

        // --- OPENAI EXCLUSIVE WIRED LOGIC ---
        async function fetchOpenAI(prompt, system) {
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) throw new Error("Kaixu Key required.");
            const res = await fetch('/.netlify/functions/gateway-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ model: "gpt-4o", messages: [{ role: "system", content: system }, { role: "user", content: prompt }] })
            });
            if (!res.ok) throw new Error("API Link Failure");
            const data = await res.json();
            return data.choices[0].message.content;
        }

        window.generateFromScratch = async () => {
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Concieving Con-Lang...";
            try {
                const prompt = "Generate a unique constructed language for a world. Return a JSON object with: title, content, vocab (list of 5 common words), family, complexity (one of: Simple / Pidgin, Standard, High / Academic, Ancient / Arcane), phonetics, script (one of: Alphabetic, Logographic, Syllabic, Abjad, Cuneiform). No markdown.";
                const result = await fetchOpenAI(prompt, "You are a master con-langer and linguist. Respond in raw JSON format only.");
                const parsed = JSON.parse(result.replace(/```json|```/g, "").trim());
                const id = 'l-' + Date.now();
                state.languages.push({ id, ...parsed, image: null });
                state.activeLangId = id;
                refreshUI(); debouncedSave();
                showToast("Linguistic Framework Seeded!", "success");
            } catch (err) { showToast("Evolution failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Constructing..."; }
        };

        window.processAI = async (type) => {
            const l = state.languages.find(x => x.id === state.activeLangId);
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            try {
                const prompt = `Expand the linguistic ${type} for this language. Name: ${l.title}. Phonetics: ${l.phonetics}. Current Data: ${l.content}. Format as academic field research documentation.`;
                const result = await fetchOpenAI(prompt, "You are a master linguist and world-class con-langer.");
                l.content += "\n\n" + result;
                refreshUI(); debouncedSave();
                showToast("Language data expanded!", "success");
            } catch (err) { showToast("Link failure", "error"); }
            finally { overlay.classList.add('hidden'); }
        };

        window.generateVisual = async () => {
            const l = state.languages.find(x => x.id === state.activeLangId);
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) return showToast("API Key required!", "error");
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Rendering Script...";
            try {
                const prompt = `Close-up of ancient stone tablet or futuristic digital parchment showing characters of a unique script: ${l.title}. Script type: ${l.script}. Phonetic feel: ${l.phonetics}. High detail digital art, cinematic lighting, realistic textures.`;
                const res = await fetch('/.netlify/functions/gateway-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: "dall-e-3", prompt, n: 1, response_format: "b64_json" })
                });
                const data = await res.json();
                l.image = `data:image/png;base64,${data.data[0].b64_json}`;
                refreshUI(); debouncedSave();
                showToast("Script Rendered!", "success");
            } catch (err) { showToast("Render failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Constructing..."; }
        };

        // --- Utils ---
        window.addLanguage = () => {
            const id = 'l-' + Date.now();
            state.languages.push({ id, title: "NEW_LANG", content: "", vocab: "", family: "Unknown", complexity: "Standard", phonetics: "Clear", script: "Alphabetic", image: null });
            state.activeLangId = id; refreshUI(); debouncedSave();
        };
        window.selectLanguage = (id) => { state.activeLangId = id; refreshUI(); };
        window.deleteLanguage = (id, e) => { e.stopPropagation(); if(state.languages.length <= 1) return; state.languages = state.languages.filter(x => x.id !== id); if(state.activeLangId === id) state.activeLangId = state.languages[0].id; refreshUI(); debouncedSave(); };
        window.removeImage = () => { const l = state.languages.find(x => x.id === state.activeLangId); if(l) l.image = null; refreshUI(); debouncedSave(); };
        window.setViewMode = (mode) => { 
            state.viewMode = mode; 
            if(mode === 'preview') { document.getElementById('editor-container').classList.add('hidden'); document.getElementById('preview-container').classList.remove('hidden'); compilePreview(); } 
            else { document.getElementById('editor-container').classList.remove('hidden'); document.getElementById('preview-container').classList.add('hidden'); } renderNav(); 
        };

        function compilePreview() {
            const cont = document.getElementById('preview-content');
            let html = `
            <div class="print-header">
                <h1>${state.title}</h1>
                <p style="font-weight: 800; font-size: 10pt; color: #64748b; text-transform: uppercase; font-family:serif;">Official Linguistic Field Guide | kAIxu Lexicon Studio</p>
            </div>`;
            
            state.languages.forEach(l => {
                html += `
                <div class="language-entry">
                    ${l.image ? `<div class="script-visual"><img src="${l.image}"></div>` : ''}
                    <h2>LANGUAGE: ${l.title}</h2>
                    <div style="margin-bottom: 20px;">
                        <p style="font-size: 10pt; margin-bottom: 5px;"><b>FAMILY:</b> ${l.family}</p>
                        <p style="font-size: 10pt; margin-bottom: 5px;"><b>TYPE:</b> ${l.script} / ${l.complexity}</p>
                        <p style="font-size: 10pt; margin-bottom: 20px;"><b>PHONETICS:</b> ${l.phonetics}</p>
                    </div>
                    
                    <div class="prose prose-sm font-serif text-slate-700 leading-relaxed" style="clear: both; margin-top: 30px; border-top: 1px solid #000; padding-top: 20px;">
                        <p style="font-weight: 900; text-transform: uppercase; font-size: 8pt; color: #000; margin-bottom: 10px;">Linguistic Analysis:</p>
                        ${l.content.split('\n\n').map(p => `<p style="margin-bottom:10px;">${p}</p>`).join('')}
                    </div>

                    <div class="grammar-block">
                        <p style="font-weight: 900; text-transform: uppercase; font-size: 8pt; color: #000; margin-bottom: 10px;">Sample Vocabulary:</p>
                        <p style="font-family: monospace; white-space: pre-wrap;">${l.vocab}</p>
                    </div>
                </div>`;
            });
            cont.innerHTML = html;
        }

        window.toggleTutorial = (show) => document.getElementById('tutorial-modal').classList.toggle('hidden', !show);

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `flex items-center gap-3 px-8 py-4 rounded-2xl shadow-2xl font-black text-xs uppercase tracking-widest transition-all animate-bounce ${type === 'error' ? 'bg-red-600' : 'bg-indigo-600'} text-white z-[200]`;
            t.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { t.classList.add('opacity-0', 'translate-x-full'); setTimeout(() => t.remove(), 500); }, 3000);
        }

        window.onload = init;
    </script>
<script src="./suite-gateway-nav.js"></script>
</body>
</html>
