<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kAIxu Codex - Lore & Law Architect</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.fb = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <style>
        /* PDF/PRINT ENGINE - ENCYCLOPEDIA STYLE */
        @media print {
            @page { margin: 0.5in; size: letter; }
            html, body { height: auto !important; overflow: visible !important; background: white !important; color: black !important; font-family: serif !important; }
            #navbar, #editor-container, #bg-canvas, .no-print, #toast-container, #tutorial-modal { display: none !important; visibility: hidden !important; }
            #preview-container { display: block !important; position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; padding: 0 !important; background: white !important; }
            #preview-content { display: block !important; width: 100% !important; }
            
            .codex-entry { page-break-inside: avoid !important; border-bottom: 2px solid #000; padding-bottom: 40px; margin-bottom: 40px; }
            .print-header { border-bottom: 5px double #000; padding-bottom: 10px; margin-bottom: 30px; text-align: center; }
            .print-header h1 { font-size: 36pt; font-weight: 900; text-transform: uppercase; margin: 0; }
            
            .entry-visual { width: 280px; border: 3px solid #000; float: left; margin-right: 25px; margin-bottom: 15px; }
            .entry-visual img { width: 100%; height: auto; display: block; }
            
            h2 { font-size: 24pt; font-weight: 900; margin-top: 0; color: #000; text-transform: uppercase; border-bottom: 1px solid #000; padding-bottom: 5px; margin-bottom: 15px; }
            .law-block { background: #f8fafc !important; padding: 20px; border-left: 5px solid #000; margin-top: 20px; font-style: italic; -webkit-print-color-adjust: exact; }
            .page-break { page-break-after: always; }
        }
        
        @keyframes scrollFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            50% { transform: translateY(-10px) rotate(2deg); opacity: 1; }
        }
        .animate-scroll { animation: scrollFloat 5s ease-in-out infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #020617; pointer-events: none; }

        .glass-sidebar { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(12px); border-right: 1px solid rgba(0,0,0,0.1) !important; }
        .glass-nav { background: rgba(255, 255, 255, 0.98) !important; backdrop-filter: blur(16px); border-bottom: 2px solid #e2e8f0 !important; }
        .editor-card { background: white !important; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        
        .nexus-link { @apply text-[10px] text-slate-500 hover:text-indigo-600 flex items-center gap-1.5 transition-colors py-0.5 font-bold uppercase tracking-tighter; }
        #tutorial-modal { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden font-sans">

    <!-- Wired Preview & PDF Dossier -->
    <div id="preview-container" class="hidden flex-1 overflow-y-auto bg-slate-950 p-12 print:p-0">

    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[110] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module">
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kaixu-codex-architect-wired';
        
        let state = {
            title: "Imperial Codex Alpha",
            entries: [{ id: 'e-1', title: "THE FIRST ACCORD", content: "The foundational law binding all neural networks to the sovereign architecture. No logic shall bypass the primary directive...", refs: "- The Prime Protocol\n- Network Zero", class: "Legal Mandate", authority: "The High Court", validity: "Absolute Truth", id_code: "CDX-001", image: null }],
            activeEntryId: 'e-1',
            viewMode: "editor",
            openaiKey: ""
        };
        let user = null, isSaving = false, saveTimeout = null;

        const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot } = window.fb;
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Three.js Floating Archive Background ---
        function initThreeJS() {
            const canvas = document.getElementById('bg-canvas');
            if(!canvas) return;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            const l1 = new THREE.PointLight(0x6366f1, 5, 100); l1.position.set(10, 10, 10); scene.add(l1);
            const l2 = new THREE.PointLight(0xfacc15, 5, 100); l2.position.set(-10, -10, 10); scene.add(l2);
            
            const group = new THREE.Group();
            const paperGeo = new THREE.BoxGeometry(0.5, 0.7, 0.05);
            for (let i = 0; i < 60; i++) {
                const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x6366f1, emissiveIntensity: 0.5, transparent: true, opacity: 0.4 });
                const mesh = new THREE.Mesh(paperGeo, mat);
                mesh.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*30, (Math.random()-0.5)*15);
                mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                group.add(mesh);
            }
            scene.add(group);

            function animate() {
                requestAnimationFrame(animate);
                group.rotation.y += 0.0006;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        async function init() {
            initThreeJS();
            document.getElementById('proj-title-input').addEventListener('input', e => { state.title = e.target.value; debouncedSave(); });
            document.getElementById('openai-key').addEventListener('input', e => { state.openaiKey = e.target.value; debouncedSave(); });
            
            const inputs = ['entry-title', 'entry-content', 'entry-refs', 'entry-class', 'entry-authority', 'entry-validity', 'entry-id-code'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const field = id.split('-')[1].replace('id-code', 'id_code');
                el.addEventListener('input', e => { 
                    const entry = state.entries.find(x => x.id === state.activeEntryId);
                    if(entry) { entry[field] = e.target.value; if(field==='title') renderSidebar(); debouncedSave(); }
                });
                if(el.tagName === 'SELECT') el.addEventListener('change', e => {
                    const entry = state.entries.find(x => x.id === state.activeEntryId);
                    if(entry) { entry[field] = e.target.value; debouncedSave(); }
                });
            });
            document.getElementById('import-input').addEventListener('change', handleImport);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (err) { console.error("Auth Error", err); }

            onAuthStateChanged(auth, u => { 
                user = u; 
                if(user) syncCloud();
            });
            renderNav();
        }

        async function syncCloud() {
            if(!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'codex', 'current');
            onSnapshot(docRef, snap => {
                if (snap.exists() && !isSaving) {
                    const data = snap.data();
                    if (data.entries && typeof data.entries === 'string') {
                        try { data.entries = JSON.parse(data.entries); } catch(e) {}
                    }
                    state = { ...state, ...data };
                    refreshUI();
                }
            });
        }

        function debouncedSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveToCloud, 2000); }

        async function saveToCloud() {
            if (!user) return;
            isSaving = true;
            const statusEl = document.getElementById('sync-status');
            statusEl.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-indigo-500"></i> <span>Syncing...</span>';
            try {
                const jsonEntries = JSON.stringify(state.entries);
                if (jsonEntries.length > 1000000) { statusEl.innerHTML = '<span class="text-amber-500">Local Only</span>'; return; }
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'codex', 'current');
                await setDoc(docRef, { ...state, entries: jsonEntries }, { merge: true });
                statusEl.innerHTML = '<i class="fa-solid fa-link text-indigo-400"></i> <span>Synced</span>';
            } catch (err) { statusEl.innerHTML = '<span>Error</span>'; }
            finally { setTimeout(() => isSaving = false, 500); }
        }

        window.exportToDevice = () => {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${state.title.replace(/\s+/g, '_')}.codex`;
            link.click();
            showToast("Backup Saved!", "success");
        };

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    state = { ...state, ...JSON.parse(e.target.result) };
                    refreshUI(); debouncedSave();
                    showToast("Codex Loaded!", "success");
                } catch (err) { showToast("Invalid file", "error"); }
            };
            reader.readAsText(file);
        }

        function refreshUI() {
            document.getElementById('proj-title-input').value = state.title;
            document.getElementById('openai-key').value = state.openaiKey || "";
            const entry = state.entries.find(x => x.id === state.activeEntryId) || state.entries[0];
            if (!entry) return;
            document.getElementById('entry-title').value = entry.title;
            document.getElementById('entry-content').value = entry.content;
            document.getElementById('entry-refs').value = entry.refs;
            document.getElementById('entry-class').value = entry.class;
            document.getElementById('entry-authority').value = entry.authority;
            document.getElementById('entry-validity').value = entry.validity;
            document.getElementById('entry-id-code').value = entry.id_code;
            renderSidebar(); renderImageArea(entry);
        }

        function renderSidebar() {
            const list = document.getElementById('entry-list');
            list.innerHTML = state.entries.map((e, idx) => `
                <div onclick="window.selectEntry('${e.id}')" class="group p-3.5 rounded-xl cursor-pointer transition-all border ${state.activeEntryId === e.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl' : 'bg-white border-slate-100 hover:border-indigo-300 text-slate-600'}">
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <span class="text-[9px] font-black w-5 h-5 rounded flex items-center justify-center shrink-0 ${state.activeEntryId === e.id ? 'bg-white text-indigo-600' : 'bg-slate-100 text-slate-400'}">${idx+1}</span>
                            <div class="overflow-hidden">
                                <span class="truncate text-xs font-bold uppercase block">${e.title || 'Untitled Entry'}</span>
                                <span class="text-[8px] opacity-60 font-mono">${e.id_code || '---'}</span>
                            </div>
                        </div>
                        <button onclick="window.deleteEntry('${e.id}', event)" class="opacity-0 group-hover:opacity-100 text-red-500"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderImageArea(entry) {
            const area = document.getElementById('entry-image-area');
            if (entry.image) {
                area.innerHTML = `<img src="${entry.image}" class="w-full h-full object-cover">
                <button onclick="window.removeImage()" class="absolute opacity-0 group-hover:opacity-100 bg-black/60 text-white p-2 rounded-lg text-[10px] backdrop-blur-md">Remove</button>`;
            } else {
                area.innerHTML = `<p class="text-slate-300 font-black uppercase text-[10px] tracking-widest text-center">kAIxu Imagery Queue</p>`;
            }
        }

        function renderNav() {
            const actions = document.getElementById('nav-actions');
            if (state.viewMode === 'editor') {
                actions.innerHTML = `<button onclick="window.setViewMode('preview')" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl transition-all">Compile Manual</button>`;
            } else {
                actions.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="window.setViewMode('editor')" class="bg-white border-2 border-slate-200 text-slate-700 py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest">Editor</button>
                        <button onclick="window.generatePDF()" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-6 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl">Export PDF</button>
                    </div>`;
            }
        }

        window.generatePDF = () => { window.focus(); window.print(); };

        // --- OPENAI EXCLUSIVE WIRED LOGIC ---
        async function fetchOpenAI(prompt, system) {
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) throw new Error("Kaixu Key required.");
            const res = await fetch('/.netlify/functions/gateway-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ model: "gpt-4o", messages: [{ role: "system", content: system }, { role: "user", content: prompt }] })
            });
            if (!res.ok) throw new Error("API Link Failure");
            const data = await res.json();
            return data.choices[0].message.content;
        }

        window.generateFromScratch = async () => {
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Writing Records...";
            try {
                const prompt = "Generate a unique world-building codex entry. Return a JSON object with: title, content, refs (see also list), class (one of: Historical Event, Legal Mandate, Technological Log, Cultural Custom, Philosophical Text), authority, validity (one of: Absolute Truth, Theoretical, Forbidden, Outdated), id_code. No markdown.";
                const result = await fetchOpenAI(prompt, "You are a master world historian and legal architect. Respond in raw JSON format only.");
                const parsed = JSON.parse(result.replace(/```json|```/g, "").trim());
                const id = 'e-' + Date.now();
                state.entries.push({ id, ...parsed, image: null });
                state.activeEntryId = id;
                refreshUI(); debouncedSave();
                showToast("Codex Entry Seeded!", "success");
            } catch (err) { showToast("Evolution failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Recording..."; }
        };

        window.processAI = async (type) => {
            const e = state.entries.find(x => x.id === state.activeEntryId);
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            try {
                const prompt = `Expand the archival ${type} for this entry. Subject: ${e.title}. Class: ${e.class}. Current Data: ${e.content}. Format as a formal imperial encyclopedia or legal archive.`;
                const result = await fetchOpenAI(prompt, "You are a master of academic and legal world-building documentation.");
                e.content += "\n\n" + result;
                refreshUI(); debouncedSave();
                showToast("Archive expanded!", "success");
            } catch (err) { showToast("Link failure", "error"); }
            finally { overlay.classList.add('hidden'); }
        };

        window.generateVisual = async () => {
            const e = state.entries.find(x => x.id === state.activeEntryId);
            const key = state.openaiKey || document.getElementById('openai-key').value;
            if(!key) return showToast("API Key required!", "error");
            const overlay = document.getElementById('parsing-overlay');
            overlay.classList.remove('hidden');
            const txtEl = document.getElementById('parsing-text');
            txtEl.innerText = "kAIxu Rendering Motif...";
            try {
                const prompt = `Close-up of a heraldic symbol, stone carving, or digital hologram representing: ${e.title}. Context: ${e.content.slice(0,300)}. Masterpiece digital art, professional lighting, realistic textures, cinematic composition.`;
                const res = await fetch('/.netlify/functions/gateway-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: "dall-e-3", prompt, n: 1, response_format: "b64_json" })
                });
                const data = await res.json();
                e.image = `data:image/png;base64,${data.data[0].b64_json}`;
                refreshUI(); debouncedSave();
                showToast("Motif Rendered!", "success");
            } catch (err) { showToast("Render failed", "error"); }
            finally { overlay.classList.add('hidden'); txtEl.innerText = "kAIxu Recording..."; }
        };

        // --- Utils ---
        window.addEntry = () => {
            const id = 'e-' + Date.now();
            state.entries.push({ id, title: "NEW_ENTRY", content: "", refs: "", class: "Historical Event", authority: "Archive", validity: "Theoretical", id_code: "CDX-NEW", image: null });
            state.activeEntryId = id; refreshUI(); debouncedSave();
        };
        window.selectEntry = (id) => { state.activeEntryId = id; refreshUI(); };
        window.deleteEntry = (id, e) => { e.stopPropagation(); if(state.entries.length <= 1) return; state.entries = state.entries.filter(x => x.id !== id); if(state.activeEntryId === id) state.activeEntryId = state.entries[0].id; refreshUI(); debouncedSave(); };
        window.removeImage = () => { const e = state.entries.find(x => x.id === state.activeEntryId); if(e) e.image = null; refreshUI(); debouncedSave(); };
        window.setViewMode = (mode) => { 
            state.viewMode = mode; 
            if(mode === 'preview') { document.getElementById('editor-container').classList.add('hidden'); document.getElementById('preview-container').classList.remove('hidden'); compilePreview(); } 
            else { document.getElementById('editor-container').classList.remove('hidden'); document.getElementById('preview-container').classList.add('hidden'); } renderNav(); 
        };

        function compilePreview() {
            const cont = document.getElementById('preview-content');
            let html = `
            <div class="print-header">
                <h1>${state.title}</h1>
                <p style="font-weight: 800; font-size: 10pt; color: #64748b; text-transform: uppercase; font-family:serif;">Official Imperial Codex Archive | kAIxu Codex Studio</p>
            </div>`;
            
            state.entries.forEach(e => {
                html += `
                <div class="codex-entry">
                    ${e.image ? `<div class="entry-visual"><img src="${e.image}"></div>` : ''}
                    <h2>SUBJECT: ${e.title}</h2>
                    <div style="margin-bottom: 20px;">
                        <p style="font-size: 10pt; margin-bottom: 5px;"><b>ARCHIVE CODE:</b> ${e.id_code}</p>
                        <p style="font-size: 10pt; margin-bottom: 5px;"><b>CLASS:</b> ${e.class} / ${e.validity}</p>
                        <p style="font-size: 10pt; margin-bottom: 20px;"><b>AUTHORITY:</b> ${e.authority}</p>
                    </div>
                    
                    <div class="prose prose-sm font-serif text-slate-700 leading-relaxed" style="clear: both; margin-top: 30px; border-top: 1px solid #000; padding-top: 20px;">
                        <p style="font-weight: 900; text-transform: uppercase; font-size: 8pt; color: #000; margin-bottom: 10px;">Primary Documentation:</p>
                        ${e.content.split('\n\n').map(p => `<p style="margin-bottom:10px;">${p}</p>`).join('')}
                    </div>

                    <div class="law-block">
                        <p style="font-weight: 900; text-transform: uppercase; font-size: 8pt; color: #000; margin-bottom: 10px;">Cross-References:</p>
                        <p style="font-family: monospace; white-space: pre-wrap;">${e.refs}</p>
                    </div>
                </div>`;
            });
            cont.innerHTML = html;
        }

        window.toggleTutorial = (show) => document.getElementById('tutorial-modal').classList.toggle('hidden', !show);

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `flex items-center gap-3 px-8 py-4 rounded-2xl shadow-2xl font-black text-xs uppercase tracking-widest transition-all animate-bounce ${type === 'error' ? 'bg-red-600' : 'bg-indigo-600'} text-white z-[200]`;
            t.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { t.classList.add('opacity-0', 'translate-x-full'); setTimeout(() => t.remove(), 500); }, 3000);
        }

        window.onload = init;
    </script>
<script src="./suite-gateway-nav.js"></script>
</body>
</html>
