<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script defer src="/assets/app.js"></script>
  <script defer src="/assets/mail-ui.js"></script>
  <link rel="stylesheet" href="/assets/mail-ui.css" />
  <title>Drafts — SkyMail Host</title>
</head>
<body data-page-id="drafts" data-page-name="Drafts" data-page-hint="Saved draft lane">
<div class="wrap">
  <div id="pageTopbar"></div>
  <div class="layout">
    <aside class="rail" id="leftRail"></aside>
    <main class="main">

      <section class="hero">
        <section class="card">
          <div class="badge" id="mailboxBadge">Checking mailbox connection…</div>
          <h1 class="h1">Drafts</h1>
          <p class="sub">Open, continue, and delete real hosted-mail drafts from the SkyMail command center.</p>
          <div class="btnrow">
            <a class="btn gold" href="/compose.html">New Draft</a>
            <button class="btn" id="refreshBtn" type="button">Refresh Drafts</button>
          </div>
        </section>
        <aside class="card"><div class="notice">Drafts open directly inside the compose lane so you can keep editing and either save or send.</div><div class="mini" id="statusText" style="margin-top:12px">Waiting for draft load…</div></aside>
      </section>
      <section class="card">
        <div class="searchbar">
          <div><label for="q">Search drafts</label><input id="q" type="text" placeholder="draft subject or recipient" /></div>
          <div><label>&nbsp;</label><button class="btn gold" id="applyBtn" type="button">Apply</button></div>
          <div><label>&nbsp;</label><button class="btn" id="clearBtn" type="button">Clear</button></div>
        </div>
        <div class="hr"></div>
        <div class="mailtable" id="draftList"><div class="empty">Loading drafts…</div></div>
        <div class="pagination"><button class="btn" id="prevBtn" type="button">Previous</button><button class="btn" id="nextBtn" type="button">Next</button></div>
      </section>

    </main>
  </div>
  <div id="appFooter"></div>
</div>
<script defer src="/assets/drafts-page.js"></script>
</body>
</html>
