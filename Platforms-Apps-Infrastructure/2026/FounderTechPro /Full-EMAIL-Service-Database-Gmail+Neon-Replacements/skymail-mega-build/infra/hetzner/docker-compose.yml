services:
  postgres:
    image: postgres:16-alpine
    container_name: skyedb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERPASSWORD}
      POSTGRES_DB: ${CONTROL_DB_NAME}
    command:
      - postgres
      - -c
      - max_connections=300
      - -c
      - shared_buffers=512MB
      - -c
      - wal_level=replica
      - -c
      - password_encryption=scram-sha-256
      - -c
      - ssl=off
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d ${CONTROL_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  runner:
    build:
      context: ../..
      dockerfile: services/runner/Dockerfile
    container_name: skyedb-runner
    restart: unless-stopped
    env_file:
      - ./env/server.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backup_tmp:/tmp/skyedb-backups

volumes:
  postgres_data:
  backup_tmp:
