<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intake Vault</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<script src="assets/app.js"></script>
<script>mountPage('intake-vault','Intake Vault','Structured records for inquiries, deals, support lanes, and quote progression.', (state)=>{document.getElementById('pageContent').innerHTML=`
<section class="card"><div class="toolbar"><div><div class="eyebrow">Structured Intake</div><div class="mini">Turn email chaos into sortable records.</div></div><div class="mini" id="intakeStatus"></div></div><div class="split" style="margin-top:14px"><div class="panel"><div class="panel-head"><strong>Intake Records</strong><button class="btn small" data-panel-toggle type="button">−</button></div><div class="panel-body"><div class="searchbar"><div><label>Search client</label><input id="intakeSearch" placeholder="search client, contact, email" /></div><div><label>Stage</label><select id="intakeStageFilter"><option value="">All</option><option>Qualified</option><option>Discovery</option><option>Active support</option><option>Closed</option></select></div><div><label>Sort</label><select id="intakeSort"><option value="due">Due date</option><option value="value">Value</option></select></div><div><label>&nbsp;</label><button class="btn gold" id="intakeAddBtn" type="button">Add Intake</button></div></div><div class="table-list" id="intakeList" style="margin-top:14px"></div></div></div><div class="panel"><div class="panel-head"><strong>Intake Editor</strong><button class="btn small" data-panel-toggle type="button">−</button></div><div class="panel-body"><input type="hidden" id="intakeId" /><div class="grid2"><div><label>Client</label><input id="intakeClient" /></div><div><label>Contact</label><input id="intakeContact" /></div><div><label>Email</label><input id="intakeEmail" /></div><div><label>Stage</label><select id="intakeStage"><option>Qualified</option><option>Discovery</option><option>Active support</option><option>Proposal</option><option>Closed</option></select></div><div><label>Value</label><input id="intakeValue" type="number" min="0" /></div><div><label>Due</label><input id="intakeDue" type="date" /></div><div><label>Next Action</label><input id="intakeAction" /></div><div><label>Files</label><input id="intakeFiles" placeholder="comma separated filenames" /></div></div><div><label>Checklist</label><input id="intakeChecklist" placeholder="comma separated checkpoints" /></div><div><label>Notes</label><textarea id="intakeNotes"></textarea></div><div class="btnrow"><button class="btn gold" id="intakeSaveBtn" type="button">Save Intake</button><button class="btn ghost" id="intakeNewBtn" type="button">New</button></div></div></div></div></section>
`;
const status=document.getElementById('intakeStatus');
function formNew(){intakeId.value=''; intakeClient.value=''; intakeContact.value=''; intakeEmail.value=''; intakeStage.value='Qualified'; intakeValue.value='0'; intakeDue.value=''; intakeAction.value=''; intakeFiles.value=''; intakeChecklist.value=''; intakeNotes.value='';}
async function save(){const item={id:intakeId.value||uid(),client:intakeClient.value.trim(),contact:intakeContact.value.trim(),email:intakeEmail.value.trim(),stage:intakeStage.value,value:Number(intakeValue.value||0),nextAction:intakeAction.value.trim(),due:intakeDue.value,checklist:intakeChecklist.value.split(',').map(s=>s.trim()).filter(Boolean),files:intakeFiles.value.split(',').map(s=>s.trim()).filter(Boolean),notes:intakeNotes.value.trim()}; await saveLaneItem(state,'intake',item); render(); status.textContent='Intake record saved.'}
function render(){const q=intakeSearch.value.toLowerCase(); const stage=intakeStageFilter.value; const sort=intakeSort.value; let list=state.intake.filter(x=>(!q||`${x.client} ${x.contact} ${x.email}`.toLowerCase().includes(q))&&(!stage||x.stage===stage)); list=list.sort((a,b)=> sort==='value' ? Number(b.value||0)-Number(a.value||0) : String(a.due||'').localeCompare(String(b.due||''))); intakeList.innerHTML=list.length?list.map(item=>`<div class="row-card"><div class="row-head"><div><div class="row-title">${safe(item.client)}</div><div class="row-sub">${safe(item.contact)} • ${safe(item.email)}</div></div><div class="actions"><button class="btn small" data-edit="${item.id}" type="button">Edit</button><button class="btn small danger" data-del="${item.id}" type="button">Delete</button></div></div><div class="chips"><span class="chip">${safe(item.stage)}</span><span class="chip">${safe(formatMoney(item.value))}</span><span class="chip">Due ${safe(formatDate(item.due))}</span><span class="chip">Next: ${safe(item.nextAction)}</span>${(item.files||[]).map(f=>`<span class="chip">${safe(f)}</span>`).join('')}</div>${laneAuditMarkup(item)}<div class="mini" style="margin-top:10px">Checklist: ${safe((item.checklist||[]).join(' • ')||'None')}</div><div class="mini" style="margin-top:6px">${safe(item.notes||'No notes')}</div></div>`).join(''):'<div class="empty">No intake records matched this filter.</div>'; intakeList.querySelectorAll('[data-edit]').forEach(btn=>btn.onclick=()=>{const item=byId(state.intake,btn.dataset.edit); if(!item) return; intakeId.value=item.id; intakeClient.value=item.client; intakeContact.value=item.contact; intakeEmail.value=item.email; intakeStage.value=item.stage; intakeValue.value=item.value; intakeDue.value=item.due; intakeAction.value=item.nextAction; intakeFiles.value=(item.files||[]).join(', '); intakeChecklist.value=(item.checklist||[]).join(', '); intakeNotes.value=item.notes;});}
[intakeSearch,intakeStageFilter,intakeSort].forEach(el=>el.oninput=render); intakeSaveBtn.onclick=()=>save().catch(err=>status.textContent=err.message||'Save failed.'); intakeNewBtn.onclick=formNew; intakeAddBtn.onclick=formNew; formNew(); hydrateLaneCollection(state,'intake').finally(render); intakeList.addEventListener('click',(event)=>{const target=event.target.closest('[data-del]'); if(!target) return; deleteLaneItem(state,'intake',target.dataset.del).then(()=>{render(); status.textContent='Intake record deleted.';}).catch(err=>status.textContent=err.message||'Delete failed.');});});</script>
</body>
</html>
