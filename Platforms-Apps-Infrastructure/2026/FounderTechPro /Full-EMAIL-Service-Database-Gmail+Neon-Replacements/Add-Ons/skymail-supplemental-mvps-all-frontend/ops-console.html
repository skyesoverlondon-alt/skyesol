<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ops Console</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<script src="assets/app.js"></script>
<script>mountPage('ops-console','Ops Console','Owner view for compliance, response health, assignment load, and revenue signals.', (state)=>{document.getElementById('pageContent').innerHTML=`
<section class="card"><div class="eyebrow">Operational KPIs</div><div class="kpi-grid" style="margin-top:14px" id="opsKpis"></div></section><section class="grid2"><section class="card"><div class="toolbar"><div><div class="eyebrow">Open Workloads</div><div class="mini">How the current app layer is loaded.</div></div><button class="btn gold" id="opsRefreshBtn" type="button">Refresh Metrics</button></div><div class="scroll-x" style="margin-top:14px"><table class="table"><thead><tr><th>Area</th><th>Open</th><th>Risk</th><th>Comment</th></tr></thead><tbody id="opsWorkTable"></tbody></table></div></section><section class="card"><div class="eyebrow">Top recovery opportunities</div><div class="table-list" style="margin-top:14px" id="opsRecoveryList"></div></section></section><section class="grid2"><section class="card"><div class="eyebrow">Owner Notes</div><div class="notice" style="margin-top:14px">This surface is the front-end analytics layer that would later be wired to your live mailbox data, tenant controls, and operator reporting APIs.</div></section><section class="card"><div class="eyebrow">Revenue Snapshot</div><div class="scroll-x" style="margin-top:14px"><table class="table"><tbody id="opsRevenueTable"></tbody></table></div></section></section>
`;
function render(){const recovered=state.recoveryLog.reduce((n,x)=>n+Number(x.estValue||0),0); const openDesk=state.sharedDesk.filter(x=>x.status!=='Closed').length; const urgentDesk=state.sharedDesk.filter(x=>x.priority==='Urgent').length; const cooling=state.followUps.filter(x=>x.health==='Cooling').length; const totalPipeline=state.intake.reduce((n,x)=>n+Number(x.value||0),0); opsKpis.innerHTML=`<div class="stat"><b>${state.analytics.replyCompliance}%</b><span class="mini">Reply compliance</span></div><div class="stat"><b>${state.analytics.avgFirstResponseMins}m</b><span class="mini">Average first response</span></div><div class="stat"><b>${formatMoney(recovered)}</b><span class="mini">Recovery queue value</span></div><div class="stat"><b>${openDesk}</b><span class="mini">Open desk assignments</span></div><div class="stat"><b>${formatMoney(totalPipeline)}</b><span class="mini">Tracked intake value</span></div>`;
 opsWorkTable.innerHTML=`<tr><td>Shared Desk</td><td>${openDesk}</td><td>${urgentDesk?'<span class="metric-danger">Urgent load</span>':'<span class="metric-up">Normal</span>'}</td><td>${urgentDesk} urgent item(s) in desk flow.</td></tr><tr><td>Follow-Up</td><td>${state.followUps.length}</td><td>${cooling?'<span class="metric-warn">Cooling leads</span>':'<span class="metric-up">Healthy</span>'}</td><td>${cooling} follow-up record(s) cooling off.</td></tr><tr><td>Intake Vault</td><td>${state.intake.length}</td><td>${state.intake.some(x=>x.stage==='Discovery')?'<span class="metric-warn">Discovery open</span>':'<span class="metric-up">Progressing</span>'}</td><td>${state.intake.filter(x=>x.stage==='Discovery').length} record(s) still in discovery.</td></tr><tr><td>Reply Studio</td><td>${state.replyTemplates.length}</td><td><span class="metric-up">Ready</span></td><td>Template library loaded for quick responses.</td></tr>`;
 opsRecoveryList.innerHTML=state.recoveryLog.length?state.recoveryLog.map(x=>`<div class="row-card"><div class="row-head"><div><div class="row-title">${safe(x.name)}</div><div class="row-sub">${safe(x.reason)}</div></div><div class="chip ${x.severity==='High'?'metric-danger':'metric-warn'}">${safe(x.severity)}</div></div><div class="mini" style="margin-top:10px">${safe(x.action)} • ${safe(formatMoney(x.estValue))}</div></div>`).join(''):'<div class="empty">No recovery items available.</div>';
 opsRevenueTable.innerHTML=`<tr><th>Tracked pipeline</th><td>${formatMoney(totalPipeline)}</td></tr><tr><th>Recovery queue</th><td>${formatMoney(recovered)}</td></tr><tr><th>Monthly recovered (seed)</th><td>${formatMoney(state.analytics.monthlyRecovered)}</td></tr><tr><th>Hot leads</th><td>${state.analytics.hotLeads}</td></tr>`;
}
opsRefreshBtn.onclick=render; render();});</script>
</body>
</html>
