<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reply Studio</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<script src="assets/app.js"></script>
<script>mountPage('reply-studio','Reply Studio','Templates, snippets, objection handling, and fast response blocks.', (state)=>{document.getElementById('pageContent').innerHTML=`
<section class="card"><div class="toolbar"><div><div class="eyebrow">Template Library</div><div class="mini">Store response packs that your mail core can call later.</div></div><div class="mini" id="templateStatus"></div></div><div class="split" style="margin-top:14px"><div class="panel"><div class="panel-head"><strong>Saved Templates</strong><button class="btn small" data-panel-toggle type="button">−</button></div><div class="panel-body"><div class="searchbar"><div><label>Search title</label><input id="templateSearch" placeholder="search templates" /></div><div><label>Category</label><select id="templateCategoryFilter"><option value="">All</option><option>Sales</option><option>Recovery</option><option>Support</option></select></div><div><label>&nbsp;</label><button class="btn gold" id="templateAddBtn" type="button">Add Template</button></div><div></div></div><div class="table-list" id="templateList" style="margin-top:14px"></div></div></div><div class="panel"><div class="panel-head"><strong>Template Editor</strong><button class="btn small" data-panel-toggle type="button">−</button></div><div class="panel-body"><input type="hidden" id="templateId" /><div class="grid2"><div><label>Title</label><input id="templateTitle" /></div><div><label>Category</label><select id="templateCategory"><option>Sales</option><option>Recovery</option><option>Support</option><option>Ops</option></select></div></div><div><label>Subject</label><input id="templateSubject" /></div><div><label>Body</label><textarea id="templateBody"></textarea></div><div class="notice">Supported variables for review: {{name}}, {{company}}, {{sender}}, {{next_step}}</div><div class="btnrow"><button class="btn gold" id="templateSaveBtn" type="button">Save Template</button><button class="btn ghost" id="templateNewBtn" type="button">New</button></div></div></div></div></section>
`;
const status=document.getElementById('templateStatus');
function formNew(){templateId.value=''; templateTitle.value=''; templateCategory.value='Sales'; templateSubject.value=''; templateBody.value='';}
async function save(){const item={id:templateId.value||uid(),title:templateTitle.value.trim(),category:templateCategory.value,subject:templateSubject.value.trim(),body:templateBody.value}; await saveLaneItem(state,'replyTemplates',item); render(); status.textContent='Template saved.'}
function render(){const q=templateSearch.value.toLowerCase(); const cat=templateCategoryFilter.value; const list=state.replyTemplates.filter(x=>(!q||`${x.title} ${x.subject}`.toLowerCase().includes(q))&&(!cat||x.category===cat)); templateList.innerHTML=list.length?list.map(item=>`<div class="row-card"><div class="row-head"><div><div class="row-title">${safe(item.title)}</div><div class="row-sub">${safe(item.subject)}</div></div><div class="actions"><button class="btn small" data-edit="${item.id}" type="button">Edit</button><button class="btn small danger" data-del="${item.id}" type="button">Delete</button></div></div><div class="chips"><span class="chip">${safe(item.category)}</span></div>${laneAuditMarkup(item)}<div class="notice" style="margin-top:10px;white-space:pre-wrap">${safe(item.body)}</div></div>`).join(''):'<div class="empty">No templates matched this filter.</div>'; templateList.querySelectorAll('[data-edit]').forEach(btn=>btn.onclick=()=>{const item=byId(state.replyTemplates,btn.dataset.edit); if(!item) return; templateId.value=item.id; templateTitle.value=item.title; templateCategory.value=item.category; templateSubject.value=item.subject; templateBody.value=item.body;});}
[templateSearch,templateCategoryFilter].forEach(el=>el.oninput=render); templateSaveBtn.onclick=()=>save().catch(err=>status.textContent=err.message||'Save failed.'); templateNewBtn.onclick=formNew; templateAddBtn.onclick=formNew; formNew(); hydrateLaneCollection(state,'replyTemplates').finally(render); templateList.addEventListener('click',(event)=>{const target=event.target.closest('[data-del]'); if(!target) return; deleteLaneItem(state,'replyTemplates',target.dataset.del).then(()=>{render(); status.textContent='Template deleted.';}).catch(err=>status.textContent=err.message||'Delete failed.');});});</script>
</body>
</html>
