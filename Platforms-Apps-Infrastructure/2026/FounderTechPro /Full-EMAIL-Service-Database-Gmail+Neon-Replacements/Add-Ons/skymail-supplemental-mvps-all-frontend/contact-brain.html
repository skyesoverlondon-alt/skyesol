<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Brain</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<script src="assets/app.js"></script>
<script>mountPage('contact-brain','Contact Brain','Relationship memory, tags, scores, owners, and high-context contact records.', (state)=>{document.getElementById('pageContent').innerHTML=`
<section class="card"><div class="toolbar"><div><div class="eyebrow">Account Memory</div><div class="mini">Build reusable context around people and companies.</div></div><div class="mini" id="contactStatus"></div></div><div class="split" style="margin-top:14px"><div class="panel"><div class="panel-head"><strong>Contacts</strong><button class="btn small" data-panel-toggle type="button">−</button></div><div class="panel-body"><div class="searchbar"><div><label>Search</label><input id="contactSearch" placeholder="search name, company, email" /></div><div><label>Segment</label><select id="contactSegment"><option value="">All</option><option>Hot lead</option><option>Partner</option><option>Client</option></select></div><div><label>Owner</label><input id="contactOwnerFilter" placeholder="owner filter" /></div><div><label>&nbsp;</label><button class="btn gold" id="contactAddBtn" type="button">Add Contact</button></div></div><div class="table-list" id="contactList" style="margin-top:14px"></div></div></div><div class="panel"><div class="panel-head"><strong>Contact Editor</strong><button class="btn small" data-panel-toggle type="button">−</button></div><div class="panel-body"><input type="hidden" id="contactId" /><div class="grid2"><div><label>Name</label><input id="contactName" /></div><div><label>Company</label><input id="contactCompany" /></div><div><label>Email</label><input id="contactEmail" /></div><div><label>Phone</label><input id="contactPhone" /></div><div><label>Score</label><input id="contactScore" type="number" min="0" max="100" /></div><div><label>Segment</label><select id="contactSegmentInput"><option>Hot lead</option><option>Partner</option><option>Client</option><option>Prospect</option></select></div><div><label>Owner</label><input id="contactOwner" /></div><div><label>Last Reply</label><input id="contactLastReply" type="date" /></div></div><div><label>Tags (comma separated)</label><input id="contactTags" /></div><div><label>Notes</label><textarea id="contactNotes"></textarea></div><div class="btnrow"><button class="btn gold" id="contactSaveBtn" type="button">Save Contact</button><button class="btn ghost" id="contactNewBtn" type="button">New</button></div></div></div></div></section>
`;
const status=document.getElementById('contactStatus');
function formNew(){contactId.value=''; contactName.value=''; contactCompany.value=''; contactEmail.value=''; contactPhone.value=''; contactScore.value='50'; contactSegmentInput.value='Prospect'; contactOwner.value=''; contactLastReply.value=''; contactTags.value=''; contactNotes.value='';}
async function save(){const item={id:contactId.value||uid(),name:contactName.value.trim(),company:contactCompany.value.trim(),email:contactEmail.value.trim(),phone:contactPhone.value.trim(),score:Number(contactScore.value||0),segment:contactSegmentInput.value,owner:contactOwner.value.trim(),lastReply:contactLastReply.value,notes:contactNotes.value.trim(),tags:contactTags.value.split(',').map(s=>s.trim()).filter(Boolean)}; await saveLaneItem(state,'contacts',item); render(); status.textContent='Contact saved.'}
function render(){const q=contactSearch.value.toLowerCase(); const seg=contactSegment.value; const own=contactOwnerFilter.value.toLowerCase(); const list=state.contacts.filter(x=>(!q||`${x.name} ${x.company} ${x.email}`.toLowerCase().includes(q))&&(!seg||x.segment===seg)&&(!own||String(x.owner||'').toLowerCase().includes(own))); contactList.innerHTML=list.length?list.map(item=>`<div class="row-card"><div class="row-head"><div><div class="row-title">${safe(item.name)}</div><div class="row-sub">${safe(item.company)} • ${safe(item.email)} • ${safe(item.phone)}</div></div><div class="actions"><button class="btn small" data-edit="${item.id}" type="button">Edit</button><button class="btn small danger" data-del="${item.id}" type="button">Delete</button></div></div><div class="chips"><span class="chip">Score ${safe(item.score)}</span><span class="chip">${safe(item.segment)}</span><span class="chip">${safe(item.owner)}</span><span class="chip">Last reply ${safe(formatDate(item.lastReply))}</span>${(item.tags||[]).map(t=>`<span class="chip">${safe(t)}</span>`).join('')}</div>${laneAuditMarkup(item)}<div class="mini" style="margin-top:10px">${safe(item.notes||'No notes')}</div></div>`).join(''):'<div class="empty">No contacts matched this filter.</div>'; contactList.querySelectorAll('[data-edit]').forEach(btn=>btn.onclick=()=>{const item=byId(state.contacts,btn.dataset.edit); if(!item) return; contactId.value=item.id; contactName.value=item.name; contactCompany.value=item.company; contactEmail.value=item.email; contactPhone.value=item.phone; contactScore.value=item.score; contactSegmentInput.value=item.segment; contactOwner.value=item.owner; contactLastReply.value=item.lastReply; contactTags.value=(item.tags||[]).join(', '); contactNotes.value=item.notes;});}
[contactSearch,contactSegment,contactOwnerFilter].forEach(el=>el.oninput=render); contactSaveBtn.onclick=()=>save().catch(err=>status.textContent=err.message||'Save failed.'); contactNewBtn.onclick=formNew; contactAddBtn.onclick=formNew; formNew(); hydrateLaneCollection(state,'contacts').finally(render); contactList.addEventListener('click',(event)=>{const target=event.target.closest('[data-del]'); if(!target) return; deleteLaneItem(state,'contacts',target.dataset.del).then(()=>{render(); status.textContent='Contact deleted.';}).catch(err=>status.textContent=err.message||'Delete failed.');});});</script>
</body>
</html>
