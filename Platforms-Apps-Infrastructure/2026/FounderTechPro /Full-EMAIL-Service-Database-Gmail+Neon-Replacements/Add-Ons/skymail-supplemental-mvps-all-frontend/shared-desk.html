<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shared Desk</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<script src="assets/app.js"></script>
<script>mountPage('shared-desk','Shared Desk','Team ownership, queueing, internal notes, and mailbox work distribution.', (state)=>{document.getElementById('pageContent').innerHTML=`
<section class="card">
  <div class="toolbar"><div><div class="eyebrow">Desk Queue</div><div class="mini">Own thread routing without changing the mail core.</div></div><div class="mini" id="deskStatus"></div></div>
  <div class="split" style="margin-top:14px">
    <div class="panel"><div class="panel-head"><strong>Desk Records</strong><button class="btn small" data-panel-toggle type="button">−</button></div><div class="panel-body"><div class="searchbar"><div><label>Search subject or contact</label><input id="deskSearch" placeholder="search queue" /></div><div><label>Queue</label><select id="deskQueue"><option value="">All</option><option>Sales</option><option>Support</option><option>Partnerships</option></select></div><div><label>Status</label><select id="deskFilterStatus"><option value="">All</option><option>Open</option><option>Assigned</option><option>Waiting</option><option>Closed</option></select></div><div><label>&nbsp;</label><button class="btn gold" id="deskAddBtn" type="button">Add Desk Item</button></div></div><div class="table-list" id="deskList" style="margin-top:14px"></div></div></div>
    <div class="panel"><div class="panel-head"><strong>Desk Editor</strong><button class="btn small" data-panel-toggle type="button">−</button></div><div class="panel-body"><div class="inline-form"><input type="hidden" id="deskId" /><div class="grid2"><div><label>Subject</label><input id="deskSubject" /></div><div><label>Contact</label><input id="deskContact" /></div><div><label>Company</label><input id="deskCompany" /></div><div><label>Email</label><input id="deskEmail" /></div><div><label>Owner</label><input id="deskOwner" /></div><div><label>Queue</label><select id="deskQueueInput"><option>Sales</option><option>Support</option><option>Partnerships</option><option>Ops</option></select></div><div><label>Priority</label><select id="deskPriority"><option>Low</option><option>Medium</option><option>High</option><option>Urgent</option></select></div><div><label>Status</label><select id="deskStatusInput"><option>Open</option><option>Assigned</option><option>Waiting</option><option>Closed</option></select></div><div><label>Waiting On</label><select id="deskWaiting"><option>Internal</option><option>Client</option><option>Vendor</option></select></div><div><label>SLA Hours</label><input id="deskSla" type="number" min="0" /></div></div><div><label>Notes</label><textarea id="deskNotes"></textarea></div><div><label>Tags (comma separated)</label><input id="deskTags" /></div><div class="btnrow"><button class="btn gold" id="deskSaveBtn" type="button">Save Item</button><button class="btn ghost" id="deskNewBtn" type="button">New</button></div></div></div></div>
  </div>
</section>
`;
const status=document.getElementById('deskStatus');
function formNew(){deskId.value=''; deskSubject.value=''; deskContact.value=''; deskCompany.value=''; deskEmail.value=''; deskOwner.value=''; deskQueueInput.value='Sales'; deskPriority.value='Medium'; deskStatusInput.value='Open'; deskWaiting.value='Internal'; deskSla.value='2'; deskNotes.value=''; deskTags.value='';}
async function save(){const item={id:deskId.value||uid(),subject:deskSubject.value.trim(),contact:deskContact.value.trim(),company:deskCompany.value.trim(),email:deskEmail.value.trim(),owner:deskOwner.value.trim(),queue:deskQueueInput.value,priority:deskPriority.value,status:deskStatusInput.value,waiting:deskWaiting.value,lastTouch:new Date().toISOString().slice(0,10),slaHours:Number(deskSla.value||0),notes:deskNotes.value.trim(),tags:deskTags.value.split(',').map(s=>s.trim()).filter(Boolean)}; await saveLaneItem(state,'sharedDesk',item); render(); status.textContent='Desk item saved.'}
function render(){const q=deskSearch.value.toLowerCase(); const queue=deskQueue.value; const stat=deskFilterStatus.value; const list=state.sharedDesk.filter(x=>(!q||`${x.subject} ${x.contact} ${x.company}`.toLowerCase().includes(q))&&(!queue||x.queue===queue)&&(!stat||x.status===stat)); deskList.innerHTML=list.length?list.map(item=>`<div class="row-card"><div class="row-head"><div><div class="row-title">${safe(item.subject)}</div><div class="row-sub">${safe(item.contact)} • ${safe(item.company)} • ${safe(item.email)}</div></div><div class="actions"><button class="btn small" data-edit="${item.id}" type="button">Edit</button><button class="btn small danger" data-del="${item.id}" type="button">Delete</button></div></div><div class="chips"><span class="chip">${safe(item.queue)}</span><span class="chip">${safe(item.owner)}</span><span class="chip">${safe(item.priority)}</span><span class="chip">${safe(item.status)}</span><span class="chip">Waiting: ${safe(item.waiting)}</span><span class="chip">SLA ${safe(item.slaHours)}h</span>${item.tags.map(t=>`<span class="chip">${safe(t)}</span>`).join('')}</div>${laneAuditMarkup(item)}<div class="mini" style="margin-top:10px">${safe(item.notes||'No notes')}</div></div>`).join(''):'<div class="empty">No desk items matched this filter.</div>'; deskList.querySelectorAll('[data-edit]').forEach(btn=>btn.onclick=()=>{const item=byId(state.sharedDesk,btn.dataset.edit); if(!item) return; deskId.value=item.id; deskSubject.value=item.subject; deskContact.value=item.contact; deskCompany.value=item.company; deskEmail.value=item.email; deskOwner.value=item.owner; deskQueueInput.value=item.queue; deskPriority.value=item.priority; deskStatusInput.value=item.status; deskWaiting.value=item.waiting; deskSla.value=item.slaHours; deskNotes.value=item.notes; deskTags.value=(item.tags||[]).join(', ');});}
[deskSearch,deskQueue,deskFilterStatus].forEach(el=>el.oninput=render); deskSaveBtn.onclick=()=>save().catch(err=>status.textContent=err.message||'Save failed.'); deskNewBtn.onclick=formNew; deskAddBtn.onclick=formNew; formNew(); hydrateLaneCollection(state,'sharedDesk').finally(render); deskList.addEventListener('click', (event)=>{const target=event.target.closest('[data-del]'); if(!target) return; deleteLaneItem(state,'sharedDesk',target.dataset.del).then(()=>{render(); status.textContent='Desk item deleted.';}).catch(err=>status.textContent=err.message||'Delete failed.');});});</script>
</body>
</html>
