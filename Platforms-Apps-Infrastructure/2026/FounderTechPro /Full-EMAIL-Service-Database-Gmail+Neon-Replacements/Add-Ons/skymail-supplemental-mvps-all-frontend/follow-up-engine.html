<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Follow-Up Engine</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<script src="assets/app.js"></script>
<script>mountPage('follow-up-engine','Follow-Up Engine','Sequences, next-touch tracking, hot lead surfacing, and reminder lanes.', (state)=>{document.getElementById('pageContent').innerHTML=`
<section class="card"><div class="toolbar"><div><div class="eyebrow">Follow-Up Pipeline</div><div class="mini">Track next touches and sequence compliance.</div></div><div class="mini" id="followStatus"></div></div><div class="split" style="margin-top:14px"><div class="panel"><div class="panel-head"><strong>Follow-Up Queue</strong><button class="btn small" data-panel-toggle type="button">−</button></div><div class="panel-body"><div class="searchbar"><div><label>Search lead</label><input id="followSearch" placeholder="search lead or email" /></div><div><label>Health</label><select id="followHealth"><option value="">All</option><option>Hot</option><option>Warm</option><option>Cooling</option><option>Cold</option></select></div><div><label>Stage</label><select id="followStage"><option value="">All</option><option>Discovery</option><option>Proposal sent</option><option>No reply</option></select></div><div><label>&nbsp;</label><button class="btn gold" id="followAddBtn" type="button">Add Follow-Up</button></div></div><div class="table-list" id="followList" style="margin-top:14px"></div></div></div><div class="panel"><div class="panel-head"><strong>Sequence Editor</strong><button class="btn small" data-panel-toggle type="button">−</button></div><div class="panel-body"><input type="hidden" id="followId" /><div class="grid2"><div><label>Lead</label><input id="followLead" /></div><div><label>Email</label><input id="followEmail" /></div><div><label>Owner</label><input id="followOwner" /></div><div><label>Stage</label><select id="followStageInput"><option>Discovery</option><option>Proposal sent</option><option>No reply</option><option>Negotiation</option></select></div><div><label>Next Touch</label><input id="followNextTouch" type="date" /></div><div><label>Cadence</label><input id="followCadence" placeholder="48h" /></div><div><label>Health</label><select id="followHealthInput"><option>Hot</option><option>Warm</option><option>Cooling</option><option>Cold</option></select></div><div><label>Sequence Step</label><input id="followStep" type="number" min="1" /></div><div><label>Template</label><input id="followTemplate" /></div></div><div><label>Notes</label><textarea id="followNotes"></textarea></div><div class="btnrow"><button class="btn gold" id="followSaveBtn" type="button">Save Follow-Up</button><button class="btn ghost" id="followNewBtn" type="button">New</button></div></div></div></div></section>
`;
const status=document.getElementById('followStatus');
function formNew(){followId.value=''; followLead.value=''; followEmail.value=''; followOwner.value=''; followStageInput.value='Discovery'; followNextTouch.value=''; followCadence.value='48h'; followHealthInput.value='Warm'; followStep.value='1'; followTemplate.value=''; followNotes.value='';}
async function save(){const item={id:followId.value||uid(),lead:followLead.value.trim(),email:followEmail.value.trim(),owner:followOwner.value.trim(),stage:followStageInput.value,nextTouch:followNextTouch.value,cadence:followCadence.value.trim(),health:followHealthInput.value,sequenceStep:Number(followStep.value||1),template:followTemplate.value.trim(),notes:followNotes.value.trim()}; await saveLaneItem(state,'followUps',item); render(); status.textContent='Follow-up record saved.'}
function render(){const q=followSearch.value.toLowerCase(); const h=followHealth.value; const st=followStage.value; const list=state.followUps.filter(x=>(!q||`${x.lead} ${x.email}`.toLowerCase().includes(q))&&(!h||x.health===h)&&(!st||x.stage===st)); followList.innerHTML=list.length?list.map(item=>`<div class="row-card"><div class="row-head"><div><div class="row-title">${safe(item.lead)}</div><div class="row-sub">${safe(item.email)} • ${safe(item.owner)}</div></div><div class="actions"><button class="btn small" data-edit="${item.id}" type="button">Edit</button><button class="btn small danger" data-del="${item.id}" type="button">Delete</button></div></div><div class="chips"><span class="chip">${safe(item.stage)}</span><span class="chip">${safe(item.health)}</span><span class="chip">Next ${safe(formatDate(item.nextTouch))}</span><span class="chip">Cadence ${safe(item.cadence)}</span><span class="chip">Step ${safe(item.sequenceStep)}</span><span class="chip">${safe(item.template)}</span></div>${laneAuditMarkup(item)}<div class="mini" style="margin-top:10px">${safe(item.notes||'No notes')}</div></div>`).join(''):'<div class="empty">No follow-up records matched this filter.</div>'; followList.querySelectorAll('[data-edit]').forEach(btn=>btn.onclick=()=>{const item=byId(state.followUps,btn.dataset.edit); if(!item) return; followId.value=item.id; followLead.value=item.lead; followEmail.value=item.email; followOwner.value=item.owner; followStageInput.value=item.stage; followNextTouch.value=item.nextTouch; followCadence.value=item.cadence; followHealthInput.value=item.health; followStep.value=item.sequenceStep; followTemplate.value=item.template; followNotes.value=item.notes;});}
[followSearch,followHealth,followStage].forEach(el=>el.oninput=render); followSaveBtn.onclick=()=>save().catch(err=>status.textContent=err.message||'Save failed.'); followNewBtn.onclick=formNew; followAddBtn.onclick=formNew; formNew(); hydrateLaneCollection(state,'followUps').finally(render); followList.addEventListener('click',(event)=>{const target=event.target.closest('[data-del]'); if(!target) return; deleteLaneItem(state,'followUps',target.dataset.del).then(()=>{render(); status.textContent='Follow-up record deleted.';}).catch(err=>status.textContent=err.message||'Delete failed.');});});</script>
</body>
</html>
