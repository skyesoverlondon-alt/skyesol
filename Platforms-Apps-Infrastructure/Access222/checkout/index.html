<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Moved — Access 222 Routing</title>
  <meta http-equiv="refresh" content="0; url=/Platforms-Apps-Infrastructure/Access222/routing/" />
  <meta name="theme-color" content="#05030a" />
  <meta name="description" content="This route moved to /routing/." />
</head>
<body>
  <div id="siteHeaderMount" data-sol-partial="header"></div>
  <p>Route moved to <a href="/Platforms-Apps-Infrastructure/Access222/routing/">/Platforms-Apps-Infrastructure/Access222/routing/</a>.</p>
  <script>
    window.location.replace('/Platforms-Apps-Infrastructure/Access222/routing/');
  </script>
  <script src="/js/SkyeSolINTRO.js"></script>
  <div id="siteFooterMount" data-sol-partial="footer"></div>
  <script id="sol-global-partials-injector">
    (function(){
      const mountHeader = document.getElementById('siteHeaderMount');
      const mountFooter = document.getElementById('siteFooterMount');
      const inject = async (url, mount) => {
        if (!mount || mount.dataset.loaded === 'true') return;
        try {
          const res = await fetch(url, { cache: 'no-cache' });
          if (!res.ok) return;
          mount.innerHTML = await res.text();
          mount.dataset.loaded = 'true';
        } catch (err) {
          console.warn('Global partial inject failed for', url, err);
        }
      };
      const run = () => {
        inject('/partials/header.html', mountHeader);
        inject('/partials/footer.html', mountFooter);
      };
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', run, { once: true });
      } else {
        run();
      }
    })();
  </script>
</body>
</html>
