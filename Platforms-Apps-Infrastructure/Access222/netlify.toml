[build]
  publish = "."
  functions = "netlify/functions"

# Netlify Forms need no extra config if HTML includes:
# - form name attribute
# - data-netlify="true"
# - hidden "form-name" input
#
# Email notifications are configured in Netlify UI:
# Site settings -> Forms -> Form notifications

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self'; manifest-src 'self'; worker-src 'self';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[redirects]]
  from = "/services/access-222"
  to = "/services/access-222/"
  status = 301

[[redirects]]
  from = "/checkout"
  to = "/checkout/"
  status = 301

[[redirects]]
  from = "/ae"
  to = "/ae/"
  status = 301
