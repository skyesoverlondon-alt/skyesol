<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AE Login — Skyesol Access 222™</title>
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#05030a" />
  <link rel="icon" href="/Platforms-Apps-Infrastructure/Access222/assets/icon-192.png" />
  <link rel="apple-touch-icon" href="/Platforms-Apps-Infrastructure/Access222/assets/icon-192.png" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="/Platforms-Apps-Infrastructure/Access222/assets/site.css" />
</head>
<body>
  <div id="siteHeaderMount" data-sol-partial="header"></div>
  <nav>
    <div class="container">
      <div class="nav-inner">
        <a class="brand" href="/Platforms-Apps-Infrastructure/Access222/ae/">
          <div class="mark" aria-hidden="true"><img src="/Platforms-Apps-Infrastructure/Access222/assets/logo.png" alt="" /></div>
          <div class="text">
            <div class="t">Skyesol Access 222™</div>
            <div class="s">AE Login</div>
          </div>
        </a>
        <div class="nav-links">
          <a class="pill" href="/Platforms-Apps-Infrastructure/Access222/ae/">Portal Home</a>
          <a class="pill" href="/">Public Site</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="hero">
      <div class="card">
        <div class="pad">
          <div class="kicker">ACCESS GATE</div>
          <h1>Passphrase required</h1>
          <p class="sub">Enter the AE passphrase to open the internal SOP.</p>

          <div class="form" style="grid-template-columns: 1fr;">
            <div class="field">
              <label>Passphrase</label>
              <input id="pw" type="password" placeholder="Enter passphrase" />
            </div>
          </div>

          <div class="actions">
            <button id="btn">Unlock SOP</button>
            <span class="mini" id="msg" aria-live="polite"></span>
          </div>

          <hr class="sep" />
          <div class="mini">
            Change the passphrase in <code>/Platforms-Apps-Infrastructure/Access222/ae/portal/portal.js</code>. This is intentionally simple.
          </div>

        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div>© <span data-year></span> Skyes Over London LC • Internal use only</div>
    </div>
  </footer>

  <script src="/Platforms-Apps-Infrastructure/Access222/assets/site.js"></script>
  <script src="/Platforms-Apps-Infrastructure/Access222/ae/portal/portal.js"></script>
  <script src="/Platforms-Apps-Infrastructure/Access222/assets/sky3d.js"></script>
  
  <script src="../../assets/app.js"></script>
  <script src="/js/SkyeSolINTRO.js"></script>
  <div id="siteFooterMount" data-sol-partial="footer"></div>
  <script id="sol-global-partials-injector">
    (function(){
      const mountHeader = document.getElementById('siteHeaderMount');
      const mountFooter = document.getElementById('siteFooterMount');
      const inject = async (url, mount) => {
        if (!mount || mount.dataset.loaded === 'true') return;
        try {
          const res = await fetch(url, { cache: 'no-cache' });
          if (!res.ok) return;
          mount.innerHTML = await res.text();
          mount.dataset.loaded = 'true';
        } catch (err) {
          console.warn('Global partial inject failed for', url, err);
        }
      };
      const run = () => {
        inject('/partials/header.html', mountHeader);
        inject('/partials/footer.html', mountFooter);
      };
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', run, { once: true });
      } else {
        run();
      }
    })();
  </script>
</body>
</html>
