<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Ecology - Live Folder Map</title>
  <meta name="description" content="Live ecology map of every public page grouped by folder across the SOLEnterprises website.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://skyesol.netlify.app/sitemap-visual.html">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#05050a">
  <style>
    :root {
      --ec-bg: #06090f;
      --ec-surface: rgba(11, 18, 28, 0.88);
      --ec-border: rgba(104, 228, 255, 0.24);
      --ec-border-strong: rgba(249, 213, 119, 0.42);
      --ec-accent: #68e4ff;
      --ec-accent-alt: #f9d577;
      --ec-text: #e6eef9;
      --ec-muted: #8ea2bf;
    }

    body {
      background:
        radial-gradient(circle at 8% 0%, rgba(104, 228, 255, 0.16), transparent 40%),
        radial-gradient(circle at 90% 10%, rgba(249, 213, 119, 0.16), transparent 36%),
        linear-gradient(180deg, #04070c 0%, #06090f 56%, #070a11 100%);
      color: var(--ec-text);
    }

    .ecology-wrap {
      width: min(1400px, 95vw);
      margin: 118px auto 64px;
    }

    .ecology-head {
      border: 1px solid var(--ec-border);
      background: linear-gradient(120deg, rgba(104, 228, 255, 0.08), rgba(249, 213, 119, 0.06));
      border-radius: 18px;
      padding: 22px 24px;
      margin-bottom: 24px;
      backdrop-filter: blur(8px);
    }

    .ecology-kicker {
      font-size: 11px;
      letter-spacing: 2.6px;
      text-transform: uppercase;
      color: var(--ec-accent);
      margin-bottom: 8px;
    }

    .ecology-head h1 {
      margin: 0;
      font-size: clamp(30px, 4.2vw, 52px);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .ecology-head p {
      margin: 12px 0 0;
      max-width: 900px;
      color: var(--ec-muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .ecology-toolbar {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .ecology-search,
    .ecology-filter {
      width: 100%;
      border: 1px solid var(--ec-border);
      border-radius: 10px;
      color: var(--ec-text);
      background: var(--ec-surface);
      padding: 12px 14px;
      font-size: 14px;
    }

    .ecology-search:focus,
    .ecology-filter:focus {
      outline: none;
      border-color: var(--ec-border-strong);
      box-shadow: 0 0 0 3px rgba(104, 228, 255, 0.18);
    }

    .ecology-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .ecology-stat {
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(11, 18, 28, 0.65);
      border-radius: 10px;
      padding: 12px 14px;
      min-height: 84px;
    }

    .ecology-stat-number {
      font-size: clamp(22px, 2.7vw, 34px);
      color: var(--ec-accent-alt);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .ecology-stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--ec-muted);
    }

    .folder-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
    }

    .folder-pill {
      text-decoration: none;
      color: var(--ec-text);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .folder-pill:hover,
    .folder-pill.active {
      border-color: var(--ec-accent-alt);
      background: rgba(249, 213, 119, 0.12);
      text-decoration: none;
    }

    .folder-section {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      margin-bottom: 14px;
      overflow: hidden;
      background: rgba(8, 13, 22, 0.82);
    }

    .folder-summary {
      cursor: pointer;
      list-style: none;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      user-select: none;
    }

    .folder-summary::-webkit-details-marker {
      display: none;
    }

    .folder-title {
      font-size: 14px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--ec-accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .folder-count {
      font-size: 11px;
      letter-spacing: 1.2px;
      color: var(--ec-muted);
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.17);
      border-radius: 999px;
      padding: 4px 10px;
    }

    .folder-links {
      padding: 0 14px 14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 10px;
    }

    .ecology-link {
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      padding: 11px 12px;
      min-height: 92px;
      display: block;
      transition: transform 0.12s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .ecology-link:hover {
      text-decoration: none;
      border-color: var(--ec-accent-alt);
      background: rgba(249, 213, 119, 0.09);
      transform: translateY(-1px);
    }

    .ecology-link-title {
      display: block;
      font-size: 13px;
      line-height: 1.35;
      color: var(--ec-text);
      margin-bottom: 8px;
      word-break: break-word;
      text-transform: capitalize;
    }

    .ecology-link-path {
      display: block;
      font-size: 11px;
      line-height: 1.35;
      color: var(--ec-muted);
      word-break: break-all;
    }

    .ecology-empty,
    .ecology-error {
      border: 1px dashed rgba(255, 255, 255, 0.22);
      border-radius: 12px;
      padding: 18px;
      color: var(--ec-muted);
      background: rgba(6, 10, 16, 0.55);
    }

    @media (max-width: 880px) {
      .ecology-wrap {
        margin-top: 96px;
      }

      .ecology-toolbar {
        grid-template-columns: 1fr;
      }

      .ecology-stats {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div id="siteHeaderMount"></div>

  <main class="ecology-wrap">
    <section class="ecology-head">
      <div class="ecology-kicker">Live Website Ecology</div>
      <h1>One Surface. Every Public Page.</h1>
      <p>
        This page is generated live from <code>/sitemap.xml</code> and sectioned by folder,
        so you can move through the whole public system as an ecosystem map, not a random list.
      </p>
    </section>

    <section class="ecology-toolbar" aria-label="Ecology controls">
      <input id="ecologySearch" class="ecology-search" type="search" placeholder="Search titles, paths, or folder names..." aria-label="Search site ecology">
      <select id="folderFilter" class="ecology-filter" aria-label="Filter by folder">
        <option value="">All folders</option>
      </select>
    </section>

    <section class="ecology-stats" aria-label="Ecology stats">
      <article class="ecology-stat">
        <div id="statTotalLinks" class="ecology-stat-number">0</div>
        <div class="ecology-stat-label">Total Public URLs</div>
      </article>
      <article class="ecology-stat">
        <div id="statFolders" class="ecology-stat-number">0</div>
        <div class="ecology-stat-label">Folders Covered</div>
      </article>
      <article class="ecology-stat">
        <div id="statVisible" class="ecology-stat-number">0</div>
        <div class="ecology-stat-label">Visible Right Now</div>
      </article>
      <article class="ecology-stat">
        <div id="statLargest" class="ecology-stat-number">-</div>
        <div class="ecology-stat-label">Largest Folder</div>
      </article>
    </section>

    <nav id="folderPills" class="folder-pills" aria-label="Folder quick jump"></nav>

    <section id="ecologySections" aria-live="polite"></section>
  </main>

  <footer id="siteFooterMount"></footer>

  <script src="/js/partials.js"></script>
  <script>
    (function () {
      const sectionsEl = document.getElementById('ecologySections');
      const folderPillsEl = document.getElementById('folderPills');
      const searchEl = document.getElementById('ecologySearch');
      const folderFilterEl = document.getElementById('folderFilter');
      const statTotalLinks = document.getElementById('statTotalLinks');
      const statFolders = document.getElementById('statFolders');
      const statVisible = document.getElementById('statVisible');
      const statLargest = document.getElementById('statLargest');

      let folders = [];

      function decodeSafe(value) {
        try {
          return decodeURIComponent(value);
        } catch {
          return value;
        }
      }

      function titleFromPath(pathname) {
        if (!pathname || pathname === '/') return 'Home';
        const cleanPath = decodeSafe(pathname).replace(/\/+$/, '');
        const bits = cleanPath.split('/').filter(Boolean);
        if (!bits.length) return 'Home';
        let leaf = bits[bits.length - 1];
        if (/^index\.html?$/i.test(leaf) && bits.length > 1) {
          leaf = bits[bits.length - 2];
        }
        return leaf
          .replace(/\.html?$/i, '')
          .replace(/[\-_]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim() || 'Page';
      }

      function folderNameFromPath(pathname) {
        const cleanPath = decodeSafe(pathname).replace(/^\/+/, '');
        const bits = cleanPath.split('/').filter(Boolean);
        return bits.length ? bits[0] : 'Root';
      }

      function normalizeHref(urlObj) {
        return urlObj.pathname + (urlObj.search || '');
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function cardHtml(item) {
        return [
          '<a class="ecology-link" href="' + escapeHtml(item.href) + '">',
          '<span class="ecology-link-title">' + escapeHtml(item.title) + '</span>',
          '<span class="ecology-link-path">' + escapeHtml(item.path) + '</span>',
          '</a>'
        ].join('');
      }

      function setStats(total, visibleCount, grouped) {
        statTotalLinks.textContent = String(total);
        statFolders.textContent = String(grouped.length);
        statVisible.textContent = String(visibleCount);
        if (!grouped.length) {
          statLargest.textContent = '-';
          return;
        }
        const largest = grouped.reduce((acc, cur) => (cur.items.length > acc.items.length ? cur : acc), grouped[0]);
        statLargest.textContent = largest.name + ' (' + largest.items.length + ')';
      }

      function renderFolderFilter(grouped) {
        folderFilterEl.innerHTML = '<option value="">All folders</option>';
        grouped.forEach(group => {
          const option = document.createElement('option');
          option.value = group.name;
          option.textContent = group.name + ' (' + group.items.length + ')';
          folderFilterEl.appendChild(option);
        });
      }

      function renderFolderPills(grouped) {
        folderPillsEl.innerHTML = '';
        grouped.forEach(group => {
          const anchor = document.createElement('a');
          anchor.className = 'folder-pill';
          anchor.href = '#folder-' + group.slug;
          anchor.textContent = group.name + ' · ' + group.items.length;
          folderPillsEl.appendChild(anchor);
        });
      }

      function buildSections(grouped) {
        sectionsEl.innerHTML = '';
        if (!grouped.length) {
          sectionsEl.innerHTML = '<div class="ecology-empty">No pages matched the current filter.</div>';
          return;
        }

        const fragment = document.createDocumentFragment();
        grouped.forEach((group, idx) => {
          const details = document.createElement('details');
          details.className = 'folder-section';
          details.id = 'folder-' + group.slug;
          details.open = idx < 6;

          const summary = document.createElement('summary');
          summary.className = 'folder-summary';
          summary.innerHTML =
            '<span class="folder-title">' + escapeHtml(group.name) + '</span>' +
            '<span class="folder-count">' + group.items.length + ' pages</span>';

          const links = document.createElement('div');
          links.className = 'folder-links';
          links.innerHTML = group.items.map(cardHtml).join('');

          details.appendChild(summary);
          details.appendChild(links);
          fragment.appendChild(details);
        });

        sectionsEl.appendChild(fragment);
      }

      function slugify(value) {
        return value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'root';
      }

      function applyFilters() {
        const query = (searchEl.value || '').trim().toLowerCase();
        const folder = folderFilterEl.value;

        const grouped = folders
          .map(group => {
            const items = group.items.filter(item => {
              const inFolder = !folder || group.name === folder;
              if (!inFolder) return false;
              if (!query) return true;
              return (
                item.title.toLowerCase().includes(query) ||
                item.path.toLowerCase().includes(query) ||
                group.name.toLowerCase().includes(query)
              );
            });
            return Object.assign({}, group, { items });
          })
          .filter(group => group.items.length > 0);

        const visibleCount = grouped.reduce((sum, group) => sum + group.items.length, 0);
        buildSections(grouped);
        renderFolderPills(grouped);
        setStats(folders.reduce((sum, g) => sum + g.items.length, 0), visibleCount, grouped);
      }

      async function loadSitemap() {
        try {
          const response = await fetch('/sitemap.xml', { cache: 'no-cache' });
          if (!response.ok) {
            throw new Error('Could not load sitemap.xml');
          }
          const xmlText = await response.text();
          const xml = new DOMParser().parseFromString(xmlText, 'application/xml');
          const nodes = Array.from(xml.querySelectorAll('url > loc'));

          const uniqueByHref = new Map();
          nodes.forEach(node => {
            const raw = (node.textContent || '').trim();
            if (!raw) return;
            let urlObj;
            try {
              urlObj = new URL(raw, window.location.origin);
            } catch {
              return;
            }

            const href = normalizeHref(urlObj);
            if (uniqueByHref.has(href)) return;

            uniqueByHref.set(href, {
              href,
              path: decodeSafe(href),
              folder: folderNameFromPath(urlObj.pathname),
              title: titleFromPath(urlObj.pathname)
            });
          });

          const groupedMap = new Map();
          uniqueByHref.forEach(item => {
            if (!groupedMap.has(item.folder)) {
              groupedMap.set(item.folder, []);
            }
            groupedMap.get(item.folder).push(item);
          });

          folders = Array.from(groupedMap.entries())
            .map(([name, items]) => ({
              name,
              slug: slugify(name),
              items: items.sort((a, b) => a.title.localeCompare(b.title))
            }))
            .sort((a, b) => {
              if (a.name === 'Root') return -1;
              if (b.name === 'Root') return 1;
              if (b.items.length !== a.items.length) return b.items.length - a.items.length;
              return a.name.localeCompare(b.name);
            });

          renderFolderFilter(folders);
          applyFilters();
        } catch (error) {
          sectionsEl.innerHTML =
            '<div class="ecology-error">Failed to load live ecology map from sitemap.xml. ' +
            'Run <code>npm run gen-sitemap</code> and refresh.</div>';
          console.error(error);
        }
      }

      searchEl.addEventListener('input', applyFilters);
      folderFilterEl.addEventListener('change', applyFilters);
      loadSitemap();
    })();
  </script>
</body>
</html>
