<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting… | SkyeLeticX</title>
  <meta http-equiv="refresh" content="0; url=/home.html" />
  <meta name="robots" content="noindex" />
  <style>
    body {
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: #070311; color: rgba(255,255,255,0.88);
      padding: 24px;
    }
    .card {
      max-width: 720px; width: 100%;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .row { display:flex; gap: 12px; align-items:center; flex-wrap:wrap; justify-content:space-between; }
    .badge {
      width: 46px; height: 46px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.25);
      display:grid; place-items:center; overflow:hidden;
    }
    .badge img { width: 40px; height: 40px; object-fit: contain; }
    a {
      display:inline-block; margin-top: 12px;
      padding: 12px 14px; border-radius: 14px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.9);
      text-decoration:none; font-weight:700;
    }
  </style>
  <!-- PWA -->
  <link rel="manifest" href="/SkyeLeticXOfficialWebsite/manifest.json" />
  <meta name="theme-color" content="#2b0b4e" />
  <link rel="apple-touch-icon" href="/SkyeLeticXOfficialWebsite/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/SkyeLeticXOfficialWebsite/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/SkyeLeticXOfficialWebsite/favicon-16.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script defer src="assets/global-nav.js"></script>
</head>
<body>
  <div class="card">
    <div class="row">
      <div style="display:flex; gap:12px; align-items:center;">
        <div class="badge"><img src="https://cdn1.sharemyimage.com/2026/02/09/SkyeLeticX_Badge_transparent_2048_png8.png" alt="SkyeLeticX badge"></div>

          <div style="font-size:12px; opacity:.75;">SkyeLeticX</div>

      <div style="opacity:.75; font-size:12px;">Redirecting to home…</div>
    </div>
    <a href="/home.html">Go to Home</a>
  </div>
  <script>
    // Netlify 404 fallback → home, without leaving users stranded.
    window.location.replace("/home.html");
  </script>

  <script>
    // SkyeLeticX PWA — register service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
